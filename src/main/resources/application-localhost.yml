spring:
  config:
    activate:
      on-profile: localhost
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/erpcorporativo?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
