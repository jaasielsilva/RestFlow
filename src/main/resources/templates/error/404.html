<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erro 404 | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
    <link rel="stylesheet" href="/css/shared/error.css" />
</head>
<body class="error-page no-sidebar">
<div class="layout">
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Erro 404', 'Recurso não encontrado', false)}"></div>
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="error-card">
                <span class="error-chip">Erro 404</span>
                <h1 class="error-title">A página solicitada não existe ou foi movida.</h1>
                <p class="error-text">Você pode continuar navegando pelos módulos disponíveis no menu lateral.</p>
                <div class="error-meta">
                    <small>Rota solicitada</small>
                    <code th:text="${path}">/rota</code>
                </div>
                <div class="error-actions">
                    <a class="app-btn app-btn-primary" th:href="@{/home}">Voltar ao Dashboard</a>
                    <a class="app-btn app-btn-outline" th:href="@{/admin/tenants}">Ir para Tenants</a>
                    <a class="app-btn app-btn-outline" th:href="@{/admin/modulos}">Ir para Módulos</a>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
