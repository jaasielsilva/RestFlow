<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"   th:attr="data-toast-message=${toastError}"   th:if="${toastError != null}"></div>

        <!-- KPIs -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
                <h6>Ativos</h6>
                <h2 th:text="${view.totalAtivos}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-star"></i></div>
                <h6>Prospectos</h6>
                <h2 th:text="${view.totalProspectos}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-circle-minus"></i></div>
                <h6>Inativos</h6>
                <h2 th:text="${view.totalInativos}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-ban"></i></div>
                <h6>Bloqueados</h6>
                <h2 th:text="${view.totalBloqueados}">0</h2>
            </div>
        </section>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-users me-2"></i>Clientes</h4>
                    <div class="d-flex gap-2">
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/clientes/oportunidades}">
                            <i class="fa-solid fa-funnel-dollar me-2"></i>Funil
                        </a>
                        <a th:if="${canWrite}" class="app-btn app-btn-primary app-btn-sm" th:href="@{/app/clientes/new}">
                            <i class="fa-solid fa-plus me-2"></i>Novo Cliente
                        </a>
                    </div>
                </div>

                <!-- Filtros -->
                <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/app/clientes}">
                    <div class="col-12 col-md-3">
                        <input class="form-control" type="text" name="nome" placeholder="Buscar por nome..."
                               th:value="${param.nome}">
                    </div>
                    <div class="col-12 col-md-2">
                        <input class="form-control" type="text" name="documento" placeholder="CPF/CNPJ..."
                               th:value="${param.documento}">
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" name="tipo">
                            <option value="">Todos os tipos</option>
                            <option th:each="t : ${tipoValues}" th:value="${t}" th:text="${t}"
                                    th:selected="${selectedTipo != null and selectedTipo == t}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" name="status">
                            <option value="">Todos os status</option>
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"
                                    th:selected="${selectedStatus != null and selectedStatus == s}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                            <i class="fa-solid fa-filter me-2"></i>Filtrar
                        </button>
                    </div>
                </form>

                <!-- Tabela -->
                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Número</th>
                            <th>Nome / Razão Social</th>
                            <th>Tipo</th>
                            <th>CPF/CNPJ</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Status</th>
                            <th>Última Interação</th>
                            <th>Oport. Abertas</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(view.items)}">
                            <td colspan="10" class="text-muted">Nenhum cliente encontrado.</td>
                        </tr>
                        <tr th:each="c : ${view.items}">
                            <td><span class="badge bg-secondary" th:text="${c.numero}">CLI-0001</span></td>
                            <td>
                                <a th:href="@{/app/clientes/{id}(id=${c.id})}" th:text="${c.nome}"
                                   class="text-decoration-none fw-semibold">Nome</a>
                            </td>
                            <td class="text-muted small" th:text="${c.tipo}">Tipo</td>
                            <td class="text-muted small" th:text="${c.documentoMascarado ?: '—'}">—</td>
                            <td class="text-muted small" th:text="${c.email ?: '—'}">—</td>
                            <td class="text-muted small" th:text="${c.telefonePrincipal ?: '—'}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${c.status.name() == 'ATIVO'} ? ' bg-success' :
                                                      (${c.status.name() == 'INATIVO'} ? ' bg-secondary' :
                                                      (${c.status.name() == 'PROSPECTO'} ? ' bg-warning text-dark' :
                                                      (${c.status.name() == 'BLOQUEADO'} ? ' bg-danger' : ' bg-secondary')))"
                                      th:text="${c.status}">Status</span>
                            </td>
                            <td class="text-muted small"
                                th:text="${c.ultimaInteracaoEm != null ? #temporals.format(c.ultimaInteracaoEm, 'dd/MM/yyyy HH:mm') : 'Sem interação'}">—</td>
                            <td class="text-center">
                                <span class="badge bg-info text-dark" th:text="${c.oportunidadesAbertas}">0</span>
                            </td>
                            <td>
                                <a class="app-btn app-btn-outline app-btn-sm"
                                   th:href="@{/app/clientes/{id}(id=${c.id})}">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginação -->
                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${view.totalPages > 1}">
                    <div class="text-muted small" th:text="'Página ' + (${view.currentPage} + 1) + ' de ' + ${view.totalPages}"></div>
                    <div class="btn-group">
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasPrev()} ? ' disabled'"
                           th:href="@{/app/clientes(page=${view.currentPage - 1}, nome=${param.nome}, documento=${param.documento}, tipo=${param.tipo}, status=${param.status})}">Anterior</a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasNext()} ? ' disabled'"
                           th:href="@{/app/clientes(page=${view.currentPage + 1}, nome=${param.nome}, documento=${param.documento}, tipo=${param.tipo}, status=${param.status})}">Próxima</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
