<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funil de Oportunidades | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"   th:attr="data-toast-message=${toastError}"   th:if="${toastError != null}"></div>

        <!-- KPIs -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-chart-line"></i></div>
                <h6>Abertas</h6>
                <h2 th:text="${view.totalAbertas}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-dollar-sign"></i></div>
                <h6>Valor Estimado</h6>
                <h2 th:text="${'R$ ' + #numbers.formatDecimal(view.valorTotalEstimado, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-trophy"></i></div>
                <h6>Ganhas no Mês</h6>
                <h2 th:text="${view.fechadasGanhasNoMes}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-percent"></i></div>
                <h6>Taxa de Conversão</h6>
                <h2 th:text="${#numbers.formatDecimal(view.taxaConversao(), 1, 'POINT', 1, 'COMMA') + '%'}">0%</h2>
            </div>
        </section>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-funnel-dollar me-2"></i>Funil de Oportunidades</h4>
                    <div class="d-flex gap-2">
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/clientes}">
                            <i class="fa-solid fa-arrow-left me-1"></i>Clientes
                        </a>
                        <button th:if="${canWrite}" class="app-btn app-btn-primary app-btn-sm"
                                data-bs-toggle="modal" data-bs-target="#modalNovaOportunidade">
                            <i class="fa-solid fa-plus me-1"></i>Nova Oportunidade
                        </button>
                    </div>
                </div>

                <!-- Kanban por status -->
                <div class="row g-3">
                    <div th:each="entry : ${view.porStatus}" class="col-12 col-md-4 col-lg-2">
                        <div class="card h-100">
                            <div class="card-header py-2 text-center fw-semibold small"
                                 th:text="${entry.key}">Status</div>
                            <div class="card-body p-2">
                                <div th:if="${#lists.isEmpty(entry.value)}" class="text-muted small text-center">—</div>
                                <div th:each="op : ${entry.value}" class="border rounded p-2 mb-2 bg-light">
                                    <div class="fw-semibold small" th:text="${op.titulo}">Título</div>
                                    <div class="text-muted" style="font-size:0.75rem;" th:text="${op.clienteNome}">Cliente</div>
                                    <div class="text-muted" style="font-size:0.75rem;"
                                         th:text="${op.valorEstimado != null ? 'R$ ' + #numbers.formatDecimal(op.valorEstimado, 1, 'POINT', 2, 'COMMA') : '—'}">—</div>
                                    <div th:if="${canWrite}" class="mt-1">
                                        <form th:action="@{/app/clientes/oportunidades/{id}/delete(id=${op.id})}"
                                              method="post" style="display:inline;"
                                              data-confirm
                                              data-confirm-title="Excluir oportunidade"
                                              data-confirm-message="A oportunidade será removida permanentemente."
                                              data-confirm-btn="Excluir"
                                              data-confirm-danger>
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button class="btn btn-outline-danger btn-sm py-0 px-1" type="submit">
                                                <i class="fa-solid fa-trash" style="font-size:0.7rem;"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<!-- Modal Nova Oportunidade -->
<div class="modal fade" id="modalNovaOportunidade" tabindex="-1" aria-labelledby="modalNovaOportunidadeLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalNovaOportunidadeLabel">Nova Oportunidade</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <form th:action="@{/app/clientes/oportunidades}" method="post" th:object="${form}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="modal-body row g-3">
                    <div class="col-12">
                        <label class="form-label">Cliente <span class="text-danger">*</span></label>
                        <select class="form-select" name="clienteId" required>
                            <option value="">Selecione...</option>
                            <option th:each="c : ${view.clientes}" th:value="${c.id}" th:text="${c.nome}">Cliente</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Título <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" name="titulo" maxlength="200" required />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" id="statusOpoModal">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}">Status</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Valor Estimado (R$)</label>
                        <input class="form-control" type="number" step="0.01" min="0" name="valorEstimado" />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Data Prevista de Fechamento</label>
                        <input class="form-control" type="date" name="dataPrevistaFechamento" />
                    </div>
                    <div class="col-12" id="campo-motivo-perda-modal" style="display:none;">
                        <label class="form-label">Motivo da Perda <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" name="motivoPerda" maxlength="500" />
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" rows="2" name="descricao"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="app-btn app-btn-primary">
                        <i class="fa-solid fa-check me-1"></i>Criar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
<script>
    (function () {
        const sel = document.getElementById('statusOpoModal');
        const campo = document.getElementById('campo-motivo-perda-modal');
        if (!sel || !campo) return;
        sel.addEventListener('change', function () {
            campo.style.display = sel.value === 'FECHADO_PERDIDO' ? '' : 'none';
        });
    })();
</script>
</body>
</html>
