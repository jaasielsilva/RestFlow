<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Portal Cliente'">Cliente | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4 th:text="${isEdit} ? 'Editar ' + ${clienteNumero} : 'Novo Cliente'">Cliente</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/clientes}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="${isEdit} ? @{/app/clientes/{id}(id=${clienteId})} : @{/app/clientes}"
                      th:object="${form}" method="post" class="row g-3"
                      data-cep-logradouro="#campo-logradouro"
                      data-cep-bairro="#campo-bairro"
                      data-cep-cidade="#campo-cidade"
                      data-cep-estado="#campo-estado"
                      data-cep-numero="#campo-numero-end">

                    <div data-app-toast data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- Tipo -->
                    <div class="col-12 col-md-4">
                        <label class="form-label">Tipo <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{tipo}" id="tipoCliente">
                            <option value="">Selecione...</option>
                            <option th:each="t : ${tipoValues}" th:value="${t}" th:text="${t}">Tipo</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}">Erro</div>
                    </div>

                    <!-- Nome -->
                    <div class="col-12 col-md-8">
                        <label class="form-label">Nome / Razão Social <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome completo ou razão social" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <!-- Campos PF -->
                    <div class="col-12" id="campos-pf">
                        <h6 class="text-muted mt-2 mb-1">Dados Pessoa Física</h6>
                    </div>
                    <div class="col-12 col-md-4" id="campo-cpf">
                        <label class="form-label">CPF</label>
                        <input class="form-control" type="text" th:field="*{documento}" placeholder="000.000.000-00" />
                    </div>
                    <div class="col-12 col-md-3" id="campo-nascimento">
                        <label class="form-label">Data de Nascimento</label>
                        <input class="form-control" type="date" th:field="*{dataNascimento}" />
                    </div>
                    <div class="col-12 col-md-3" id="campo-genero">
                        <label class="form-label">Gênero</label>
                        <select class="form-select" th:field="*{genero}">
                            <option value="">Não informado</option>
                            <option th:each="g : ${generoValues}" th:value="${g}" th:text="${g}">Gênero</option>
                        </select>
                    </div>

                    <!-- Campos PJ -->
                    <div class="col-12" id="campos-pj" style="display:none;">
                        <h6 class="text-muted mt-2 mb-1">Dados Pessoa Jurídica</h6>
                    </div>
                    <div class="col-12 col-md-4" id="campo-cnpj" style="display:none;">
                        <label class="form-label">CNPJ</label>
                        <input class="form-control" type="text" placeholder="00.000.000/0000-00" />
                    </div>
                    <div class="col-12 col-md-4" id="campo-fantasia" style="display:none;">
                        <label class="form-label">Nome Fantasia</label>
                        <input class="form-control" type="text" th:field="*{nomeFantasia}" placeholder="Nome fantasia" />
                    </div>
                    <div class="col-12 col-md-3" id="campo-ie" style="display:none;">
                        <label class="form-label">Inscrição Estadual</label>
                        <input class="form-control" type="text" th:field="*{inscricaoEstadual}" placeholder="IE" />
                    </div>
                    <div class="col-12 col-md-4" id="campo-contato" style="display:none;">
                        <label class="form-label">Contato Principal</label>
                        <input class="form-control" type="text" th:field="*{contatoPrincipal}" placeholder="Nome do contato" />
                    </div>

                    <!-- Contato -->
                    <div class="col-12">
                        <h6 class="text-muted mt-2 mb-1">Contato</h6>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">E-mail</label>
                        <input class="form-control" type="email" th:field="*{email}" placeholder="email@exemplo.com" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Telefone Principal</label>
                        <input class="form-control" type="text" th:field="*{telefonePrincipal}" placeholder="(00) 00000-0000" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Telefone Secundário</label>
                        <input class="form-control" type="text" th:field="*{telefoneSecundario}" placeholder="(00) 00000-0000" />
                    </div>

                    <!-- Endereço -->
                    <div class="col-12">
                        <h6 class="text-muted mt-2 mb-1">Endereço</h6>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">CEP</label>
                        <input class="form-control" type="text" th:field="*{cep}" id="campo-cep"
                               placeholder="00000-000" maxlength="9" data-cep />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Logradouro</label>
                        <input class="form-control" type="text" th:field="*{logradouro}" id="campo-logradouro" placeholder="Rua, Av..." />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Número</label>
                        <input class="form-control" type="text" th:field="*{numeroEndereco}" id="campo-numero-end" placeholder="Nº" />
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Complemento</label>
                        <input class="form-control" type="text" th:field="*{complemento}" placeholder="Apto, Sala..." />
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Bairro</label>
                        <input class="form-control" type="text" th:field="*{bairro}" id="campo-bairro" placeholder="Bairro" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Cidade</label>
                        <input class="form-control" type="text" th:field="*{cidade}" id="campo-cidade" placeholder="Cidade" />
                    </div>
                    <div class="col-12 col-md-2">
                        <label class="form-label">Estado</label>
                        <input class="form-control" type="text" th:field="*{estado}" id="campo-estado" placeholder="UF" maxlength="2" />
                    </div>

                    <!-- Status -->
                    <div class="col-12 col-md-3">
                        <label class="form-label">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}" id="statusCliente">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}">Status</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Erro</div>
                    </div>

                    <!-- Motivo Bloqueio -->
                    <div class="col-12 col-md-9" id="campo-motivo-bloqueio" style="display:none;">
                        <label class="form-label">Motivo do Bloqueio <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" th:field="*{motivoBloqueio}" placeholder="Descreva o motivo do bloqueio" maxlength="500" />
                    </div>

                    <!-- Observações -->
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" rows="3" th:field="*{observacoes}" placeholder="Observações livres..."></textarea>
                    </div>

                    <!-- Ações -->
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-check me-2"></i>
                            <span th:text="${isEdit} ? 'Salvar alterações' : 'Cadastrar Cliente'">Salvar</span>
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/app/clientes}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
<script src="/js/shared/cep.js"></script>
<script>
    (function () {
        const tipoSelect = document.getElementById('tipoCliente');
        const statusSelect = document.getElementById('statusCliente');
        const camposPF = ['campos-pf', 'campo-cpf', 'campo-nascimento', 'campo-genero'];
        const camposPJ = ['campos-pj', 'campo-cnpj', 'campo-fantasia', 'campo-ie', 'campo-contato'];

        function toggleTipo() {
            const isPF = tipoSelect.value === 'PESSOA_FISICA';
            const isPJ = tipoSelect.value === 'PESSOA_JURIDICA';
            camposPF.forEach(id => document.getElementById(id).style.display = isPF ? '' : 'none');
            camposPJ.forEach(id => document.getElementById(id).style.display = isPJ ? '' : 'none');
        }

        function toggleBloqueio() {
            const el = document.getElementById('campo-motivo-bloqueio');
            el.style.display = statusSelect.value === 'BLOQUEADO' ? '' : 'none';
        }

        tipoSelect.addEventListener('change', toggleTipo);
        statusSelect.addEventListener('change', toggleBloqueio);
        toggleTipo();
        toggleBloqueio();
    })();
</script>
</body>
</html>
