<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Portal Cliente'">Relatórios | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>

<body>
    <div class="layout">
        <!-- Sidebar + modal Sair: fragment em fragments/sidebar-tenant.html -->
        <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>

        <main class="main">
            <!-- Barra superior com título/subtítulo vindos do controller -->
            <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

            <!-- Área de conteúdo: use bottom-grid + card-ui como nas outras telas do tenant -->
            <section class="bottom-grid">

                <!-- ================= KPIs ================= -->
                <div class="row g-3 mb-4">

                    <div class="col-md-4">
                        <div class="card-ui p-3">
                            <h6>Faturamento Hoje</h6>
                            <h4 th:text="${dashboard.faturamentoHoje}"></h4>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-ui p-3">
                            <h6>Faturamento Mês</h6>
                            <h4 th:text="${dashboard.faturamentoMes}"></h4>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card-ui p-3">
                            <h6>Crescimento</h6>
                            <h4 th:text="${dashboard.crescimentoPercentual + '%'}"></h4>
                        </div>
                    </div>

                </div>

                <!-- ================= TOP CLIENTES ================= -->
                <div class="row g-3 mb-4">

                    <div class="col-md-6">
                        <div class="card-ui p-3 h-100">
                            <h5 class="mb-3">Top Clientes</h5>

                            <ul class="list-unstyled mb-0">
                                <li th:each="c : ${dashboard.topClientes}"
                                    class="d-flex justify-content-between border-bottom py-2">

                                    <span th:text="${c.nome}"></span>
                                    <strong th:text="${c.total}"></strong>
                                </li>
                            </ul>

                        </div>
                    </div>

                    <!-- ================= TOP SERVIÇOS ================= -->
                    <div class="col-md-6">
                        <div class="card-ui p-3 h-100">
                            <h5 class="mb-3">Top Serviços</h5>

                            <ul class="list-unstyled mb-0">
                                <li th:each="s : ${dashboard.topServicos}"
                                    class="d-flex justify-content-between border-bottom py-2">

                                    <span th:text="${s.nome}"></span>
                                    <strong th:text="${s.total}"></strong>
                                </li>
                            </ul>

                        </div>
                    </div>

                </div>

            </section>


        </main>
    </div>
</body>

</html>
