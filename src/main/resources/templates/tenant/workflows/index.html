<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automações | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <h4><i class="fa-solid fa-gears me-2"></i>Regras</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Nome</th><th>Evento</th><th>Ação</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(rules)}"><td colspan="4" class="text-muted">Sem regras.</td></tr>
                        <tr th:each="r : ${rules}">
                            <td th:text="${r.nome}"></td>
                            <td th:text="${r.eventType}"></td>
                            <td th:text="${r.actionType}"></td>
                            <td th:text="${r.ativo ? 'Ativa' : 'Inativa'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-ui">
                <h4><i class="fa-solid fa-list-check me-2"></i>Execuções recentes</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Evento</th><th>Entidade</th><th>Sucesso</th><th>Mensagem</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(logs)}"><td colspan="4" class="text-muted">Sem execuções.</td></tr>
                        <tr th:each="l : ${logs}">
                            <td th:text="${l.eventType}"></td>
                            <td th:text="${l.entityType + ' #' + (l.entityId ?: 0)}"></td>
                            <td th:text="${l.success ? 'Sim' : 'Não'}"></td>
                            <td th:text="${l.message}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
