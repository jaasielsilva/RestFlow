<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BI Avançado | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>
        <section class="stats-grid">
            <div class="stat-card"><h6>Clientes</h6><h2 th:text="${bi.totalClientes}">0</h2></div>
            <div class="stat-card"><h6>Oportunidades abertas</h6><h2 th:text="${bi.totalOportunidadesAbertas}">0</h2></div>
            <div class="stat-card"><h6>Ordens abertas</h6><h2 th:text="${bi.totalOrdensAbertas}">0</h2></div>
            <div class="stat-card"><h6>Chamados abertos</h6><h2 th:text="${bi.totalChamadosAbertos}">0</h2></div>
        </section>
        <section class="bottom-grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="card-ui"><h5>Pipeline estimado</h5><h3 th:text="${'R$ ' + #numbers.formatDecimal(bi.pipelineEstimado,1,'POINT',2,'COMMA')}"></h3></div>
            <div class="card-ui"><h5>Receita mês</h5><h3 th:text="${'R$ ' + #numbers.formatDecimal(bi.receitaMensalAtual,1,'POINT',2,'COMMA')}"></h3></div>
            <div class="card-ui"><h5>Conversão</h5><h3 th:text="${bi.taxaConversaoOportunidades + '%'}"></h3></div>
        </section>
    </main>
</div>
</body>
</html>
