<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compliance | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <h4><i class="fa-solid fa-shield-halved me-2"></i>Solicitações LGPD</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Tipo</th><th>Status</th><th>Criado em</th><th>Detalhe</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(requests)}"><td colspan="4" class="text-muted">Sem solicitações.</td></tr>
                        <tr th:each="r : ${requests}">
                            <td th:text="${r.requestType}"></td>
                            <td th:text="${r.status}"></td>
                            <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${r.responseNote ?: '-'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-ui">
                <h4><i class="fa-solid fa-file-signature me-2"></i>Trilha de consentimento</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Chave</th><th>Aceito</th><th>Base legal</th><th>Data</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(consents)}"><td colspan="4" class="text-muted">Sem registros de consentimento.</td></tr>
                        <tr th:each="c : ${consents}">
                            <td th:text="${c.consentKey}"></td>
                            <td th:text="${c.accepted ? 'Sim' : 'Não'}"></td>
                            <td th:text="${c.legalBasis ?: '-'}"></td>
                            <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
