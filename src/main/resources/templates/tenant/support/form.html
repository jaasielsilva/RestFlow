<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chamado | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 2fr 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-ticket me-2"></i><span th:text="${isEdit} ? 'Editar chamado' : 'Novo chamado'">Novo chamado</span></h4>
                </div>

                <form th:if="${isEdit}"
                      th:action="@{/app/suporte/{id}(id=${ticket.id})}"
                      method="post"
                      th:object="${form}"
                      enctype="multipart/form-data"
                      class="row g-3">
                    <div class="col-12">
                        <div class="alert alert-danger mb-0" th:if="${#fields.hasGlobalErrors()}">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</div>
                        </div>
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12">
                        <label class="form-label">Assunto</label>
                        <input class="form-control" th:field="*{assunto}" />
                        <div class="text-danger small" th:errors="*{assunto}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" rows="5" th:field="*{descricao}"></textarea>
                        <div class="text-danger small" th:errors="*{descricao}"></div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Categoria</label>
                        <input class="form-control" th:field="*{categoria}" />
                        <div class="text-danger small" th:errors="*{categoria}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{status}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Prioridade</label>
                        <select class="form-select" th:field="*{prioridade}">
                            <option th:each="p : ${prioridadeValues}" th:value="${p}" th:text="${p}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{prioridade}"></div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Cliente vinculado</label>
                        <select class="form-select" th:field="*{clienteId}">
                            <option value="">Nenhum</option>
                            <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Responsável</label>
                        <select class="form-select" th:field="*{responsavelId}">
                            <option value="">Não atribuído</option>
                            <option th:each="u : ${responsaveis}" th:value="${u.id}" th:text="${u.nome}"></option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Solicitante</label>
                        <input class="form-control" th:field="*{solicitanteNome}" />
                        <div class="text-danger small" th:errors="*{solicitanteNome}"></div>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Email do solicitante</label>
                        <input class="form-control" th:field="*{solicitanteEmail}" />
                        <div class="text-danger small" th:errors="*{solicitanteEmail}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Anexos</label>
                        <input type="file" class="form-control" name="files" multiple />
                        <div class="form-text">Formatos permitidos: PNG, JPG, WEBP, PDF, TXT (máx. 10MB).</div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary app-btn-sm" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Salvar
                        </button>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte/{id}(id=${ticket.id})}">
                            Cancelar
                        </a>
                    </div>
                </form>

                <form th:unless="${isEdit}"
                      th:action="@{/app/suporte}"
                      method="post"
                      th:object="${form}"
                      enctype="multipart/form-data"
                      class="row g-3">
                    <div class="col-12">
                        <div class="alert alert-danger mb-0" th:if="${#fields.hasGlobalErrors()}">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</div>
                        </div>
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12">
                        <label class="form-label">Assunto</label>
                        <input class="form-control" th:field="*{assunto}" />
                        <div class="text-danger small" th:errors="*{assunto}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" rows="5" th:field="*{descricao}"></textarea>
                        <div class="text-danger small" th:errors="*{descricao}"></div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Categoria</label>
                        <input class="form-control" th:field="*{categoria}" />
                        <div class="text-danger small" th:errors="*{categoria}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{status}"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Prioridade</label>
                        <select class="form-select" th:field="*{prioridade}">
                            <option th:each="p : ${prioridadeValues}" th:value="${p}" th:text="${p}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{prioridade}"></div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Cliente vinculado</label>
                        <select class="form-select" th:field="*{clienteId}">
                            <option value="">Nenhum</option>
                            <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Responsável</label>
                        <select class="form-select" th:field="*{responsavelId}">
                            <option value="">Não atribuído</option>
                            <option th:each="u : ${responsaveis}" th:value="${u.id}" th:text="${u.nome}"></option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Solicitante</label>
                        <input class="form-control" th:field="*{solicitanteNome}" />
                        <div class="text-danger small" th:errors="*{solicitanteNome}"></div>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Email do solicitante</label>
                        <input class="form-control" th:field="*{solicitanteEmail}" />
                        <div class="text-danger small" th:errors="*{solicitanteEmail}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Anexos</label>
                        <input type="file" class="form-control" name="files" multiple />
                        <div class="form-text">Formatos permitidos: PNG, JPG, WEBP, PDF, TXT (máx. 10MB).</div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary app-btn-sm" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Salvar
                        </button>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte}">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>

            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-book-open me-2"></i>Artigos sugeridos</h4>
                </div>
                <div th:if="${#lists.isEmpty(suggestions)}" class="text-muted">
                    Nenhuma sugestão por enquanto.
                </div>
                <ul class="list-group list-group-flush" th:if="${!#lists.isEmpty(suggestions)}">
                    <li class="list-group-item" th:each="article : ${suggestions}">
                        <a th:href="@{/app/conhecimento/{id}(id=${article.id})}" th:text="${article.titulo}" class="text-decoration-none"></a>
                        <div class="small text-muted" th:text="${article.categoria}"></div>
                    </li>
                </ul>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
