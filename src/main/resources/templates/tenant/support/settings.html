<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuração de SLA | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>
        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-gauge-high me-2"></i>Política de SLA</h4>
                </div>

                <form method="post" th:object="${form}" th:action="@{/app/suporte/settings}" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="col-md-4">
                        <label class="form-label">Primeira resposta (minutos)</label>
                        <input class="form-control" type="number" min="5" th:field="*{firstResponseMinutes}" />
                        <div class="text-danger small" th:errors="*{firstResponseMinutes}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Resolução (minutos)</label>
                        <input class="form-control" type="number" min="10" th:field="*{resolutionMinutes}" />
                        <div class="text-danger small" th:errors="*{resolutionMinutes}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Aviso antes do vencimento (minutos)</label>
                        <input class="form-control" type="number" min="1" th:field="*{warningBeforeMinutes}" />
                        <div class="text-danger small" th:errors="*{warningBeforeMinutes}"></div>
                    </div>
                    <div class="col-12">
                        <button class="app-btn app-btn-primary app-btn-sm" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Salvar política
                        </button>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte}">Voltar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
