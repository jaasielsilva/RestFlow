<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suporte | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <th:block th:replace="~{fragments/module-standard :: moduleToasts(${toastSuccess}, ${toastError})}"></th:block>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-folder-open"></i></div>
                <h6>Abertos</h6>
                <h2 th:text="${view.totalAbertos}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-user-clock"></i></div>
                <h6>Em Atendimento</h6>
                <h2 th:text="${view.totalAtendimento}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
                <h6>Resolvidos</h6>
                <h2 th:text="${view.totalResolvidos}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <h6>SLA Violado</h6>
                <h2 th:text="${view.totalViolados}">0</h2>
            </div>
        </section>

        <section class="bottom-grid module-page-grid">
            <div class="card-ui module-card">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-headset me-2"></i>Chamados</h4>
                    <div class="d-flex gap-2">
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte/dashboard}">
                            <i class="fa-solid fa-chart-line me-2"></i>Dashboard
                        </a>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte/settings}" th:if="${canWrite}">
                            <i class="fa-solid fa-sliders me-2"></i>SLA
                        </a>
                        <a class="app-btn app-btn-primary app-btn-sm" th:href="@{/app/suporte/new}" th:if="${canWrite}">
                            <i class="fa-solid fa-plus me-2"></i>Novo chamado
                        </a>
                    </div>
                </div>

                <form class="row g-2 align-items-end mb-3 tenant-filter-form module-filter-form" method="get" th:action="@{/app/suporte}">
                    <div class="col-12 col-md-3">
                        <input class="form-control" type="text" name="assunto" placeholder="Assunto..." th:value="${param.assunto}">
                    </div>
                    <div class="col-12 col-md-2">
                        <input class="form-control" type="text" name="categoria" placeholder="Categoria..." th:value="${param.categoria}">
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" name="status">
                            <option value="">Todos os status</option>
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}" th:selected="${param.status != null and param.status[0] == s.name()}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" name="prioridade">
                            <option value="">Todas prioridades</option>
                            <option th:each="p : ${prioridadeValues}" th:value="${p}" th:text="${p}" th:selected="${param.prioridade != null and param.prioridade[0] == p.name()}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" name="sla">
                            <option value="">Todos SLA</option>
                            <option th:each="s : ${slaValues}" th:value="${s}" th:text="${s}" th:selected="${param.sla != null and param.sla[0] == s.name()}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-1">
                        <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                            <i class="fa-solid fa-filter"></i>
                        </button>
                    </div>
                </form>

                <div class="table-responsive module-table-wrap">
                    <table class="table align-middle table-left module-table">
                        <thead>
                        <tr>
                            <th>Número</th>
                            <th>Assunto</th>
                            <th>Categoria</th>
                            <th>Status</th>
                            <th>Prioridade</th>
                            <th>SLA</th>
                            <th>Responsável</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <th:block th:if="${#lists.isEmpty(view.items)}">
                            <tr th:replace="~{fragments/module-standard :: tableEmptyRow(8, 'Nenhum chamado encontrado.')}"></tr>
                        </th:block>
                        <tr th:each="item : ${view.items}">
                            <td><span class="badge bg-secondary" th:text="${item.numero}">SUP-00001</span></td>
                            <td>
                                <a th:href="@{/app/suporte/{id}(id=${item.id})}" class="text-decoration-none fw-semibold" th:text="${item.assunto}">Assunto</a>
                            </td>
                            <td th:text="${item.categoria ?: '—'}">Categoria</td>
                            <td><span class="badge bg-primary" th:text="${item.status}">ABERTO</span></td>
                            <td><span class="badge bg-dark" th:text="${item.prioridade}">MEDIA</span></td>
                            <td>
                                <span th:class="${item.slaState.name() == 'VIOLADO'} ? 'badge bg-danger' : (${item.slaState.name() == 'PROXIMO_VENCIMENTO'} ? 'badge bg-warning text-dark' : 'badge bg-success')"
                                      th:text="${item.slaState}">DENTRO_PRAZO</span>
                            </td>
                            <td th:text="${item.responsavelNome ?: '—'}">—</td>
                            <td>
                                <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/suporte/{id}(id=${item.id})}">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3 module-pagination" th:if="${view.totalPages > 1}">
                    <div class="text-muted small" th:text="'Página ' + (${view.currentPage} + 1) + ' de ' + ${view.totalPages}"></div>
                    <div class="btn-group">
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasPrev()} ? ' disabled'"
                           th:href="@{/app/suporte(page=${view.currentPage - 1}, assunto=${param.assunto}, categoria=${param.categoria}, status=${param.status}, prioridade=${param.prioridade}, sla=${param.sla})}">Anterior</a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasNext()} ? ' disabled'"
                           th:href="@{/app/suporte(page=${view.currentPage + 1}, assunto=${param.assunto}, categoria=${param.categoria}, status=${param.status}, prioridade=${param.prioridade}, sla=${param.sla})}">Próxima</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
