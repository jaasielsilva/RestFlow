<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Portal Cliente'">Usuário | Portal Cliente</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4 th:text="${isEdit} ? 'Editar Usuário' : 'Novo Usuário'">Usuário</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/usuarios}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="${isEdit} ? @{/app/usuarios/{id}(id=${userId})} : @{/app/usuarios}"
                      th:object="${form}"
                      method="post"
                      class="row g-3">
                    <div data-app-toast
                         data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-6">
                        <label class="form-label">Nome</label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome do usuário" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" th:field="*{email}" placeholder="email@tenant.com" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erro</div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Senha</label>
                        <input class="form-control" type="password" th:field="*{password}"
                               th:placeholder="${isEdit} ? 'Deixe em branco para manter a senha atual' : 'Informe a senha'" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Erro</div>
                    </div>

                    <div class="col-12 col-md-3">
                        <label class="form-label">Perfil</label>
                        <select class="form-select" th:field="*{role}">
                            <option th:value="${T(com.jaasielsilva.erpcorporativo.app.model.Role).ADMIN}">ADMIN</option>
                            <option th:value="${T(com.jaasielsilva.erpcorporativo.app.model.Role).USER}">USER</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">Erro</div>
                    </div>

                    <div class="col-12 col-md-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{ativo}">
                            <option th:value="true">Ativo</option>
                            <option th:value="false">Inativo</option>
                        </select>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-check me-2"></i>
                            <span th:text="${isEdit} ? 'Salvar alterações' : 'Criar usuário'">Salvar</span>
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/app/usuarios}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
