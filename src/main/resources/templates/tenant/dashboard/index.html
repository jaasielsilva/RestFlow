<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Cliente | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/auth/home.css">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-users"></i></div>
                <h6>Usuários Ativos</h6>
                <h2>-</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-puzzle-piece"></i></div>
                <h6>Módulos Habilitados</h6>
                <h2>-</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-list-check"></i></div>
                <h6>Tarefas Hoje</h6>
                <h2>-</h2>
            </div>
        </section>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Área Inicial do Cliente</h4>
                </div>
                <p class="text-muted mb-0">
                    Esse dashboard é o ponto de entrada dos ADMINs dos tenants.
                    A partir daqui você pode evoluir os módulos de cliente sem expor funcionalidades da plataforma.
                </p>
            </div>
        </section>
    </main>
</div>
</body>
</html>
