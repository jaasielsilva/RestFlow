<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Integrações | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <h4><i class="fa-solid fa-plug me-2"></i>Endpoints cadastrados</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Nome</th><th>Evento</th><th>URL</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(endpoints)}"><td colspan="4" class="text-muted">Sem endpoints.</td></tr>
                        <tr th:each="e : ${endpoints}">
                            <td th:text="${e.nome}"></td>
                            <td th:text="${e.eventType}"></td>
                            <td th:text="${e.url}"></td>
                            <td th:text="${e.ativo ? 'Ativo' : 'Inativo'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-ui">
                <h4><i class="fa-solid fa-wave-square me-2"></i>Últimos logs</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Evento</th><th>Endpoint</th><th>Status</th><th>Data</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(logs)}"><td colspan="4" class="text-muted">Sem logs.</td></tr>
                        <tr th:each="l : ${logs}">
                            <td th:text="${l.eventType}"></td>
                            <td th:text="${l.endpointNome ?: '-'}"></td>
                            <td th:text="${l.status}"></td>
                            <td th:text="${#temporals.format(l.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
