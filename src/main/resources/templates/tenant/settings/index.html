<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | Portal Cliente</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/auth/home.css">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Segurança da conta</h4>
                </div>

                <div data-app-toast
                     data-toast-type="success"
                     th:attr="data-toast-message=${toastSuccess}"
                     th:if="${toastSuccess != null}"></div>
                <div data-app-toast
                     data-toast-type="error"
                     th:attr="data-toast-message=${toastError}"
                     th:if="${toastError != null}"></div>

                <p class="text-muted mb-3">
                    Atualize sua senha de acesso. Mínimo de
                    <strong th:text="${passwordMinLength}">8</strong> caracteres.
                </p>

                <form class="row g-3" th:action="@{/app/configuracoes/alterar-senha}" method="post" th:object="${passwordForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="currentPassword">Senha atual</label>
                        <input id="currentPassword"
                               class="form-control"
                               type="password"
                               th:field="*{currentPassword}"
                               required
                               autocomplete="current-password" />
                    </div>

                    <div class="col-12 col-md-6"></div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="newPassword">Nova senha</label>
                        <input id="newPassword"
                               class="form-control"
                               type="password"
                               th:field="*{newPassword}"
                               required
                               autocomplete="new-password" />
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="confirmPassword">Confirmar nova senha</label>
                        <input id="confirmPassword"
                               class="form-control"
                               type="password"
                               th:field="*{confirmPassword}"
                               required
                               autocomplete="new-password" />
                    </div>

                    <div class="col-12">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-lock me-2"></i>Alterar senha
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
