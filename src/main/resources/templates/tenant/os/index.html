<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordens de Serviço | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"   th:attr="data-toast-message=${toastError}"   th:if="${toastError != null}"></div>

        <!-- KPIs -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-folder-open"></i></div>
                <h6>Abertas</h6>
                <h2 th:text="${view.totalAbertas}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-spinner"></i></div>
                <h6>Em Andamento</h6>
                <h2 th:text="${view.totalEmAndamento}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
                <h6>Concluídas</h6>
                <h2 th:text="${view.totalConcluidas}">0</h2>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fa-solid fa-ban"></i></div>
                <h6>Canceladas</h6>
                <h2 th:text="${view.totalCanceladas}">0</h2>
            </div>
        </section>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-receipt me-2"></i>Ordens de Serviço</h4>
                    <a th:if="${canWrite}" class="app-btn app-btn-primary app-btn-sm" th:href="@{/app/pedidos/new}">
                        <i class="fa-solid fa-plus me-2"></i>Nova OS
                    </a>
                </div>

                <!-- Filtros -->
                <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/app/pedidos}">
                    <div class="col-12 col-md-4">
                        <input class="form-control" type="text" name="titulo" placeholder="Buscar por título..."
                               th:value="${param.titulo}">
                    </div>
                    <div class="col-12 col-md-3">
                        <input class="form-control" type="text" name="cliente" placeholder="Buscar por cliente..."
                               th:value="${param.cliente}">
                    </div>
                    <div class="col-12 col-md-3">
                        <select class="form-select" name="status">
                            <option value="">Todos os status</option>
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"
                                    th:selected="${selectedStatus != null and selectedStatus == s}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                            <i class="fa-solid fa-filter me-2"></i>Filtrar
                        </button>
                    </div>
                </form>

                <!-- Tabela -->
                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Número</th>
                            <th>Título</th>
                            <th>Cliente</th>
                            <th>Status</th>
                            <th>Previsto</th>
                            <th>Responsável</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(view.items)}">
                            <td colspan="7" class="text-muted">Nenhuma ordem de serviço encontrada.</td>
                        </tr>
                        <tr th:each="os : ${view.items}">
                            <td><span class="badge bg-secondary" th:text="${os.numero}">OS-0001</span></td>
                            <td>
                                <a th:href="@{/app/pedidos/{id}(id=${os.id})}" th:text="${os.titulo}"
                                   class="text-decoration-none fw-semibold">Título</a>
                            </td>
                            <td th:text="${os.clienteNome}">Cliente</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${os.status.name() == 'ABERTA'} ? ' bg-primary' :
                                                      (${os.status.name() == 'EM_ANDAMENTO'} ? ' bg-warning text-dark' :
                                                      (${os.status.name() == 'CONCLUIDA'} ? ' bg-success' :
                                                      (${os.status.name() == 'CANCELADA'} ? ' bg-danger' : ' bg-secondary')))"
                                      th:text="${os.status}">Status</span>
                            </td>
                            <td class="text-muted small"
                                th:text="${os.dataPrevista != null ? #temporals.format(os.dataPrevista, 'dd/MM/yyyy') : '—'}">—</td>
                            <td class="text-muted small" th:text="${os.responsavelNome ?: '—'}">—</td>
                            <td>
                                <a class="app-btn app-btn-outline app-btn-sm"
                                   th:href="@{/app/pedidos/{id}(id=${os.id})}">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginação -->
                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${view.totalPages > 1}">
                    <div class="text-muted small" th:text="'Página ' + (${view.currentPage} + 1) + ' de ' + ${view.totalPages}"></div>
                    <div class="btn-group">
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasPrev()} ? ' disabled'"
                           th:href="@{/app/pedidos(page=${view.currentPage - 1}, titulo=${param.titulo}, cliente=${param.cliente}, status=${param.status})}">Anterior</a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${!view.hasNext()} ? ' disabled'"
                           th:href="@{/app/pedidos(page=${view.currentPage + 1}, titulo=${param.titulo}, cliente=${param.cliente}, status=${param.status})}">Próxima</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
