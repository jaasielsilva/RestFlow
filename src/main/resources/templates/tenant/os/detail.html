<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${os.numero} + ' | Portal Cliente'">OS | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"   th:attr="data-toast-message=${toastError}"   th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 2fr 1fr;">

            <!-- Detalhes principais -->
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4>
                        <span class="badge bg-secondary me-2" th:text="${os.numero}">OS-0001</span>
                        <span th:text="${os.titulo}">Título</span>
                    </h4>
                    <div class="d-flex gap-2">
                        <a th:if="${canWrite}" class="app-btn app-btn-outline app-btn-sm"
                           th:href="@{/app/pedidos/{id}/edit(id=${os.id})}">
                            <i class="fa-solid fa-pen me-1"></i>Editar
                        </a>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/pedidos}">
                            <i class="fa-solid fa-arrow-left me-1"></i>Voltar
                        </a>
                    </div>
                </div>

                <div class="mb-3" th:if="${os.descricao != null and !os.descricao.isBlank()}">
                    <label class="form-label text-muted">Descrição</label>
                    <p th:text="${os.descricao}" style="white-space: pre-wrap;">—</p>
                </div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label text-muted">Cliente</label>
                        <p class="fw-semibold mb-0" th:text="${os.clienteNome}">—</p>
                        <small class="text-muted" th:if="${os.clienteEmail != null}" th:text="${os.clienteEmail}"></small>
                        <small class="text-muted d-block" th:if="${os.clienteTelefone != null}" th:text="${os.clienteTelefone}"></small>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label text-muted">Responsável</label>
                        <p class="mb-0" th:text="${os.responsavelNome ?: '—'}">—</p>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label text-muted">Criada em</label>
                        <p class="mb-0 text-muted small"
                           th:text="${os.createdAt != null ? #temporals.format(os.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</p>
                    </div>
                </div>
            </div>

            <!-- Painel lateral -->
            <div class="d-flex flex-column gap-3">

                <!-- Status atual -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4>Status</h4>
                    </div>
                    <div class="mb-3">
                        <span class="badge fs-6"
                              th:classappend="${os.status.name() == 'ABERTA'} ? ' bg-primary' :
                                              (${os.status.name() == 'EM_ANDAMENTO'} ? ' bg-warning text-dark' :
                                              (${os.status.name() == 'CONCLUIDA'} ? ' bg-success' :
                                              (${os.status.name() == 'CANCELADA'} ? ' bg-danger' : ' bg-secondary')))"
                              th:text="${os.status}">Status</span>
                    </div>
                    <form th:if="${canWrite}" th:action="@{/app/pedidos/{id}/status(id=${os.id})}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <select class="form-select form-select-sm" name="status">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"
                                    th:selected="${os.status == s}">Status</option>
                        </select>
                        <button class="app-btn app-btn-secondary app-btn-sm" type="submit">Atualizar</button>
                    </form>
                </div>

                <!-- Financeiro -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4>Financeiro</h4>
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Valor</span>
                            <strong th:text="${os.valor != null ? 'R$ ' + #numbers.formatDecimal(os.valor, 1, 'POINT', 2, 'COMMA') : '—'}">—</strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Previsto para</span>
                            <strong th:text="${os.dataPrevista != null ? #temporals.format(os.dataPrevista, 'dd/MM/yyyy') : '—'}">—</strong>
                        </li>
                    </ul>
                </div>

                <!-- Excluir -->
                <div class="card-ui" th:if="${canFull}">
                    <form th:action="@{/app/pedidos/{id}/delete(id=${os.id})}" method="post"
                          data-confirm
                          data-confirm-title="Excluir OS"
                          data-confirm-message="Esta ação é irreversível. A ordem de serviço será removida permanentemente."
                          data-confirm-btn="Excluir"
                          data-confirm-danger>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="app-btn app-btn-sm w-100" style="background:#fee2e2;color:#b91c1c;border:none;" type="submit">
                            <i class="fa-solid fa-trash me-2"></i>Excluir OS
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
