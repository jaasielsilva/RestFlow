<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Portal Cliente'">OS | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4 th:text="${isEdit} ? 'Editar OS ' + ${osNumero} : 'Nova Ordem de Serviço'">OS</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/pedidos}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="${isEdit} ? @{/app/pedidos/{id}(id=${osId})} : @{/app/pedidos}"
                      th:object="${form}" method="post" class="row g-3">

                    <div data-app-toast data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- Título -->
                    <div class="col-12">
                        <label class="form-label">Título <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" th:field="*{titulo}" placeholder="Descreva brevemente o serviço" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">Erro</div>
                    </div>

                    <!-- Descrição -->
                    <div class="col-12">
                        <label class="form-label">Descrição detalhada</label>
                        <textarea class="form-control" rows="4" th:field="*{descricao}"
                                  placeholder="Detalhes do serviço, escopo, observações..."></textarea>
                    </div>

                    <!-- Cliente -->
                    <div class="col-12">
                        <h6 class="text-muted mt-2 mb-1">Dados do Cliente</h6>
                    </div>
                    <div class="col-12 col-md-5">
                        <label class="form-label">Nome do cliente <span class="text-danger">*</span></label>
                        <input class="form-control" type="text" th:field="*{clienteNome}" placeholder="Nome ou empresa" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('clienteNome')}" th:errors="*{clienteNome}">Erro</div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" th:field="*{clienteEmail}" placeholder="email@cliente.com" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Telefone</label>
                        <input class="form-control" type="text" th:field="*{clienteTelefone}" placeholder="(00) 00000-0000" />
                    </div>

                    <!-- Status, Valor, Data -->
                    <div class="col-12">
                        <h6 class="text-muted mt-2 mb-1">Controle</h6>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}">Status</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Valor (R$)</label>
                        <input class="form-control" type="number" step="0.01" min="0" th:field="*{valor}" placeholder="0,00" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Data prevista</label>
                        <input class="form-control" type="date" th:field="*{dataPrevista}" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Responsável</label>
                        <select class="form-select" th:field="*{responsavelId}">
                            <option value="">Sem responsável</option>
                            <option th:each="r : ${responsaveis}" th:value="${r.id}" th:text="${r.nome}">Nome</option>
                        </select>
                    </div>

                    <!-- Ações -->
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-check me-2"></i>
                            <span th:text="${isEdit} ? 'Salvar alterações' : 'Criar OS'">Salvar</span>
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/app/pedidos}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
