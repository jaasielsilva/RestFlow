<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificações | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main notifications-page">
        <div th:replace="~{fragments/topbar :: topbar('Notificações', 'Atualizações financeiras e operacionais do seu tenant', true)}"></div>

        <section class="card-ui notifications-filter-card">
            <form method="get" th:action="@{/app/notifications}" class="row g-2 align-items-end">
                <div class="col-12 col-md-3">
                    <label class="form-label" for="tenantNotifType">Tipo</label>
                    <select id="tenantNotifType" class="form-select" name="type" title="Filtrar por tipo">
                        <option value="">Todos</option>
                        <option value="PAYMENT" th:selected="${selectedType == 'PAYMENT'}">Pagamento</option>
                    </select>
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label" for="tenantNotifReadStatus">Leitura</label>
                    <select id="tenantNotifReadStatus" class="form-select" name="readStatus" title="Filtrar por leitura">
                        <option value="">Todos</option>
                        <option value="UNREAD" th:selected="${selectedReadStatus == 'UNREAD'}">Não lidas</option>
                        <option value="READ" th:selected="${selectedReadStatus == 'READ'}">Lidas</option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label" for="tenantNotifDateFrom">De</label>
                    <input id="tenantNotifDateFrom" class="form-control" type="date" name="dateFrom" th:value="${selectedDateFrom}" title="Data inicial" />
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label" for="tenantNotifDateTo">Até</label>
                    <input id="tenantNotifDateTo" class="form-control" type="date" name="dateTo" th:value="${selectedDateTo}" title="Data final" />
                </div>
                <div class="col-12 col-md-2 d-grid">
                    <button class="app-btn app-btn-primary app-btn-sm" type="submit">
                        <i class="fa-solid fa-filter me-2"></i>Filtrar
                    </button>
                </div>
            </form>
        </section>

        <section class="card-ui">
            <div class="card-header-ui">
                <h4><i class="fa-solid fa-bell me-2"></i>Timeline</h4>
                <span class="badge bg-danger" th:text="${unreadCount} + ' não lidas'">0 não lidas</span>
            </div>

            <div th:if="${#lists.isEmpty(items)}" class="text-muted">Nenhuma notificação encontrada para os filtros aplicados.</div>

            <div class="notifications-timeline" th:unless="${#lists.isEmpty(items)}">
                <article class="notification-item" th:each="n : ${items}" th:classappend="${n.read()} ? ' read' : ' unread'">
                    <div class="notification-item-title-row">
                        <strong th:text="${n.title()}">Título</strong>
                        <span class="notification-item-meta" th:text="${n.createdAt() != null ? #temporals.format(n.createdAt(), 'dd/MM/yyyy HH:mm') : '-'}">-</span>
                    </div>
                    <p class="notification-item-message" th:text="${n.message()}">Mensagem</p>
                    <div class="notification-item-footer">
                        <span class="badge bg-secondary" th:text="${n.type()}">TIPO</span>
                        <span class="badge" th:classappend="${n.read()} ? ' bg-success' : ' bg-warning text-dark'" th:text="${n.read()} ? 'Lida' : 'Não lida'">Estado</span>
                    </div>
                </article>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
