<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faturas | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>
        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error" th:attr="data-toast-message=${toastError}" th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-file-invoice-dollar me-2"></i>Faturas</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/minha-conta}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Minha conta
                    </a>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Referência</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th>Provedor</th>
                            <th>Pagamento</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(invoices)}">
                            <td colspan="6" class="text-muted">Sem faturas para exibir.</td>
                        </tr>
                        <tr th:each="inv : ${invoices}">
                            <td th:text="${inv.referencia}"></td>
                            <td th:text="${'R$ ' + #numbers.formatDecimal(inv.valor,1,'POINT',2,'COMMA')}"></td>
                            <td><span class="badge bg-secondary" th:text="${inv.status}"></span></td>
                            <td th:text="${inv.provider}"></td>
                            <td th:text="${inv.dataPagamento != null ? #temporals.format(inv.dataPagamento, 'dd/MM/yyyy') : '-'}"></td>
                            <td>
                                <form method="post" th:action="@{/app/minha-conta/faturas/{id}/checkout(id=${inv.id})}" th:if="${inv.status.name() != 'PAGO'}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="app-btn app-btn-primary app-btn-sm">
                                        <i class="fa-solid fa-credit-card me-2"></i>Pagar com Mercado Pago
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
