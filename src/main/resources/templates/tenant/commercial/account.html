<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Conta | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>
        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error" th:attr="data-toast-message=${toastError}" th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="card-ui">
                <div class="card-header-ui"><h4><i class="fa-solid fa-id-card me-2"></i>Plano atual</h4></div>
                <p><strong>Plano:</strong> <span th:text="${profile.planNome ?: 'Sem plano'}"></span></p>
                <p><strong>Código:</strong> <span th:text="${profile.planCodigo ?: '-'}"></span></p>
                <p><strong>Tier:</strong> <span th:text="${profile.planTier ?: '-'}"></span></p>
                <p><strong>Limite usuários:</strong> <span th:text="${profile.maxUsers ?: 'livre'}"></span></p>
                <p><strong>Storage:</strong> <span th:text="${profile.maxStorageGb != null ? profile.maxStorageGb + ' GB' : 'livre'}"></span></p>
                <p><strong>Anual disponível:</strong> <span th:text="${profile.annualDiscountEligible ? 'Sim' : 'Não'}"></span></p>
                <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/app/minha-conta/faturas}">
                    <i class="fa-solid fa-file-invoice me-2"></i>Ver faturas
                </a>
            </div>
            <div class="card-ui">
                <div class="card-header-ui"><h4><i class="fa-solid fa-credit-card me-2"></i>Cobrança</h4></div>
                <p><strong>Email:</strong> <span th:text="${profile.billingProfile.billingEmail}"></span></p>
                <p><strong>Ciclo:</strong> <span th:text="${profile.billingProfile.billingCycle}"></span></p>
                <div class="d-flex gap-2">
                    <form method="post" th:action="@{/app/minha-conta/billing/mensal}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="app-btn app-btn-secondary app-btn-sm" type="submit">Mensal</button>
                    </form>
                    <form method="post" th:action="@{/app/minha-conta/billing/anual}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="app-btn app-btn-secondary app-btn-sm" type="submit">Anual</button>
                    </form>
                </div>
            </div>
            <div class="card-ui" style="grid-column: 1 / -1;">
                <div class="card-header-ui"><h4><i class="fa-solid fa-list-check me-2"></i>Onboarding</h4></div>
                <p><strong>Status:</strong> <span th:text="${profile.onboarding.status}"></span></p>
                <p><strong>Template:</strong> <span th:text="${profile.onboarding.templateCode ?: '-'}"></span></p>
                <div class="progress mb-2" role="progressbar">
                    <div class="progress-bar" th:style="'width:' + ${profile.onboarding.completionPercent} + '%'" th:text="${profile.onboarding.completionPercent + '%'}"></div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
