<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base de Conhecimento | Portal Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar-tenant :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-book-open me-2"></i>Artigos Disponíveis</h4>
                </div>

                <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/app/conhecimento}">
                    <div class="col-12 col-md-5">
                        <label class="form-label">Buscar</label>
                        <input class="form-control" type="text" name="busca" placeholder="Título do artigo"
                               th:value="${param.busca}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">Categoria</label>
                        <select class="form-select" name="categoria">
                            <option value="">Todas</option>
                            <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"
                                    th:selected="${param.categoria != null and param.categoria[0] == cat}">
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3">
                        <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                            <i class="fa-solid fa-filter me-2"></i>Filtrar
                        </button>
                    </div>
                </form>

                <div th:if="${#lists.isEmpty(articles)}" class="text-muted py-3">
                    Nenhum artigo disponível no momento.
                </div>

                <div class="row g-3" th:unless="${#lists.isEmpty(articles)}">
                    <div class="col-12 col-md-6" th:each="a : ${articles}">
                        <div class="card h-100 border-0 shadow-sm p-3">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <span class="badge bg-secondary" th:text="${a.categoria}">cat</span>
                                <span class="text-muted small"
                                      th:text="${a.createdAt != null ? #temporals.format(a.createdAt, 'dd/MM/yyyy') : ''}"></span>
                            </div>
                            <h5 class="mb-1">
                                <a th:href="@{/app/conhecimento/{id}(id=${a.id})}"
                                   th:text="${a.titulo}" class="text-decoration-none">Título</a>
                            </h5>
                            <p class="text-muted small mb-3" th:if="${a.resumo != null}" th:text="${a.resumo}"></p>
                            <a class="app-btn app-btn-outline app-btn-sm mt-auto"
                               th:href="@{/app/conhecimento/{id}(id=${a.id})}">
                                <i class="fa-solid fa-arrow-right me-2"></i>Ler artigo
                            </a>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 1}">
                    <div class="text-muted" th:text="'Página ' + (${currentPage} + 1) + ' de ' + ${totalPages}"></div>
                    <div class="btn-group">
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${currentPage == 0} ? ' disabled'"
                           th:href="@{/app/conhecimento(page=${currentPage - 1}, categoria=${param.categoria}, busca=${param.busca})}">Anterior</a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                           th:href="@{/app/conhecimento(page=${currentPage + 1}, categoria=${param.categoria}, busca=${param.busca})}">Próxima</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
