<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Plano | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('permissions')}"></aside>
    <main class="main permissions-page">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>
        <div th:replace="~{admin/permissions/fragments :: subnav('new-plan')}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error" th:attr="data-toast-message=${toastError}" th:if="${toastError != null}"></div>

        <section class="card-ui">
            <div class="card-header-ui">
                <h4><i class="fa-solid fa-plus me-2"></i>Novo Plano de Assinatura</h4>
            </div>

            <form th:action="@{/admin/permissions/plans}" th:object="${form}" method="post" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="col-12 col-md-2">
                    <label class="form-label" for="planCodigo">Código</label>
                    <input id="planCodigo" class="form-control" type="text" th:field="*{codigo}" placeholder="ex: BASIC" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}">Erro</div>
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label" for="planNome">Nome</label>
                    <input id="planNome" class="form-control" type="text" th:field="*{nome}" placeholder="Nome do plano" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label" for="planDescricao">Descrição</label>
                    <input id="planDescricao" class="form-control" type="text" th:field="*{descricao}" placeholder="Opcional" />
                </div>

                <div class="col-12 col-md-2">
                    <label class="form-label" for="planAtivo">Status</label>
                    <select id="planAtivo" class="form-select" th:field="*{ativo}">
                        <option th:value="true">Ativo</option>
                        <option th:value="false">Inativo</option>
                    </select>
                </div>

                <div class="col-12 col-md-2">
                    <label class="form-label" for="planTier">Tier</label>
                    <select id="planTier" class="form-select" th:field="*{tier}">
                        <option value="START">START</option>
                        <option value="GROWTH">GROWTH</option>
                        <option value="SCALE">SCALE</option>
                    </select>
                </div>

                <div class="col-12 col-md-2">
                    <label class="form-label" for="planMaxUsers">Máx. usuários</label>
                    <input id="planMaxUsers" class="form-control" type="number" min="1" th:field="*{maxUsers}" placeholder="Opcional" />
                </div>

                <div class="col-12 col-md-2">
                    <label class="form-label" for="planMaxStorage">Storage (GB)</label>
                    <input id="planMaxStorage" class="form-control" type="number" min="1" th:field="*{maxStorageGb}" placeholder="Opcional" />
                </div>

                <div class="col-12 col-md-3">
                    <label class="form-label" for="planOnboardingTemplate">Template onboarding</label>
                    <input id="planOnboardingTemplate" class="form-control" type="text" th:field="*{onboardingTemplate}" placeholder="START/GROWTH/SCALE" />
                </div>

                <div class="col-12 col-md-1 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" id="planAnnualDiscount" type="checkbox" th:field="*{annualDiscountEligible}" aria-label="Elegível para desconto anual" />
                        <label class="form-check-label" for="planAnnualDiscount">Anual</label>
                    </div>
                </div>

                <div class="col-12 col-lg-6" th:if="${not #lists.isEmpty(view.availableModules)}">
                    <details class="permissions-catalog" open>
                        <summary>
                            <span class="fw-semibold">Módulos incluídos no plano</span>
                            <span class="text-muted small" th:text="${#lists.size(view.availableModules)} + ' itens'">0 itens</span>
                        </summary>
                        <div class="permissions-search mt-2">
                            <label class="visually-hidden" for="moduleFilter">Filtrar módulos</label>
                            <input class="form-control form-control-sm" id="moduleFilter" type="text" placeholder="Filtrar módulos..." aria-label="Filtrar módulos" />
                        </div>
                        <div class="permissions-checkbox-grid mt-2" id="moduleList">
                            <div class="form-check permission-item" th:each="m : ${view.availableModules}" th:attr="data-name=${#strings.toLowerCase(m.nome)}">
                                <label class="form-check-label d-inline-flex align-items-center gap-2">
                                    <input class="form-check-input" type="checkbox" name="moduleIds" th:value="${m.id}" />
                                    <span th:text="${m.nome}">Módulo</span>
                                </label>
                            </div>
                        </div>
                    </details>
                </div>

                <div class="col-12 col-lg-6" th:if="${not #lists.isEmpty(view.availableAddons)}">
                    <details class="permissions-catalog">
                        <summary>
                            <span class="fw-semibold">Add-ons liberados neste plano</span>
                            <span class="text-muted small" th:text="${#lists.size(view.availableAddons)} + ' itens'">0 itens</span>
                        </summary>
                        <div class="permissions-search mt-2">
                            <label class="visually-hidden" for="addonFilter">Filtrar add-ons</label>
                            <input class="form-control form-control-sm" id="addonFilter" type="text" placeholder="Filtrar add-ons..." aria-label="Filtrar add-ons" />
                        </div>
                        <div class="permissions-checkbox-grid mt-2" id="addonList">
                            <div class="form-check permission-item" th:each="a : ${view.availableAddons}" th:attr="data-name=${#strings.toLowerCase(a.nome)}">
                                <label class="form-check-label d-inline-flex align-items-center gap-2">
                                    <input class="form-check-input" type="checkbox" name="addonIds" th:value="${a.id}" />
                                    <span th:text="${a.nome}">Addon</span>
                                </label>
                            </div>
                        </div>
                    </details>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2">
                    <a class="app-btn app-btn-outline" th:href="@{/admin/permissions/plans}">Cancelar</a>
                    <button class="app-btn app-btn-primary permissions-save-btn" type="submit">
                        <i class="fa-solid fa-plus me-2"></i>Criar plano
                    </button>
                </div>
            </form>
        </section>
    </main>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        function setupFilter(inputId, listId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            if (!input || !list) return;
            input.addEventListener('input', function () {
                const term = input.value.toLowerCase().trim();
                list.querySelectorAll('.permission-item').forEach(function (item) {
                    const name = item.getAttribute('data-name') || '';
                    item.style.display = name.includes(term) ? '' : 'none';
                });
            });
        }
        setupFilter('moduleFilter', 'moduleList');
        setupFilter('addonFilter', 'addonList');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
