<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permissões | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('permissions')}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Permissões', 'Planos de assinatura e controle de acesso por tenant', true)}"></div>

        <div data-app-toast data-toast-type="success"
             th:attr="data-toast-message=${toastSuccess}"
             th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"
             th:attr="data-toast-message=${toastError}"
             th:if="${toastError != null}"></div>

        <!-- Criar novo plano -->
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-plus me-2"></i>Novo Plano de Assinatura</h4>
                </div>

                <form th:action="@{/admin/permissions/plans}" th:object="${form}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-2">
                        <label class="form-label">Código</label>
                        <input class="form-control" type="text" th:field="*{codigo}" placeholder="ex: BASIC" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}">Erro</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Nome</label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome do plano" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Descrição</label>
                        <input class="form-control" type="text" th:field="*{descricao}" placeholder="Opcional" />
                    </div>

                    <div class="col-12 col-md-2">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{ativo}">
                            <option th:value="true">Ativo</option>
                            <option th:value="false">Inativo</option>
                        </select>
                    </div>

                    <div class="col-12" th:if="${not #lists.isEmpty(view.availableModules)}">
                        <label class="form-label">Módulos incluídos no plano</label>
                        <div class="d-flex flex-wrap gap-3">
                            <div class="form-check" th:each="m : ${view.availableModules}">
                                <input class="form-check-input" type="checkbox"
                                       th:id="'mod_' + ${m.id}"
                                       name="moduleIds"
                                       th:value="${m.id}" />
                                <label class="form-check-label" th:for="'mod_' + ${m.id}" th:text="${m.nome}">Módulo</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-plus me-2"></i>Criar plano
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Lista de planos -->
        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-list me-2"></i>Planos Cadastrados</h4>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Código</th>
                            <th>Módulos</th>
                            <th>Status</th>
                            <th>Criação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(view.plans)}">
                            <td colspan="5" class="text-muted">Nenhum plano cadastrado.</td>
                        </tr>
                        <tr th:each="plan : ${view.plans}">
                            <td th:text="${plan.nome}">Plano</td>
                            <td><span class="text-muted" th:text="${plan.codigo}">CODIGO</span></td>
                            <td>
                                <span th:if="${#lists.isEmpty(plan.modules)}" class="text-muted">Nenhum</span>
                                <div class="d-flex flex-wrap gap-1" th:unless="${#lists.isEmpty(plan.modules)}">
                                    <span class="badge bg-secondary" th:each="m : ${plan.modules}" th:text="${m.nome}">Módulo</span>
                                </div>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${plan.ativo} ? ' badge-success' : ' badge-warning'"
                                      th:text="${plan.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                            </td>
                            <td th:text="${plan.createdAt != null ? #temporals.format(plan.createdAt, 'dd/MM/yyyy') : '-'}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-end mt-2">
                    <span class="text-muted" th:text="'Total: ' + ${#lists.size(view.plans)}">Total: 0</span>
                </div>
            </div>
        </section>

        <!-- Atribuir plano a tenant -->
        <section class="bottom-grid" style="grid-template-columns: 1fr;" th:if="${not #lists.isEmpty(view.plans) and not #lists.isEmpty(view.tenants)}">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4><i class="fa-solid fa-link me-2"></i>Atribuir Plano a Tenant</h4>
                </div>
                <p class="text-muted mb-3">
                    Ao atribuir um plano, os módulos incluídos serão provisionados automaticamente para o tenant.
                </p>

                <form th:action="@{/admin/permissions/tenants/__${view.tenants[0].id}__/assign}" method="post"
                      id="assignPlanForm" class="row g-3 align-items-end">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-5">
                        <label class="form-label">Tenant</label>
                        <select class="form-select" id="tenantSelect" onchange="updateAssignAction(this)">
                            <option th:each="t : ${view.tenants}"
                                    th:value="${t.id}"
                                    th:text="${t.nome}">Tenant</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-5">
                        <label class="form-label">Plano</label>
                        <select class="form-select" name="planId">
                            <option th:each="p : ${view.plans}"
                                    th:value="${p.id}"
                                    th:text="${p.nome} + ' (' + ${p.codigo} + ')'">Plano</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-2">
                        <button class="app-btn app-btn-primary w-100" type="submit">
                            <i class="fa-solid fa-check me-2"></i>Atribuir
                        </button>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

<script th:inline="javascript">
    function updateAssignAction(select) {
        const tenantId = select.value;
        const form = document.getElementById('assignPlanForm');
        form.action = '/admin/permissions/tenants/' + tenantId + '/assign';
    }

    document.addEventListener('DOMContentLoaded', function () {
        const select = document.getElementById('tenantSelect');
        if (select) updateAssignAction(select);
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
