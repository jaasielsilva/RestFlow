<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matriz de Permissões | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('permissions')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Permissões', 'Matriz de acesso por role e módulo', false)}"></div>

        <div data-app-toast data-toast-type="success"
             th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"
             th:attr="data-toast-message=${toastError}" th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4>
                        <i class="fa-solid fa-shield-halved me-2"></i>
                        Permissões — <span th:text="${matrix.tenant().nome}">Tenant</span>
                    </h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/permissions}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <p class="text-muted mb-3">
                    Configure o nível de acesso de cada role aos módulos habilitados para este tenant.
                    <strong>ADMIN sempre tem acesso FULL</strong> por padrão.
                </p>

                <div th:if="${#lists.isEmpty(matrix.enabledModules())}">
                    <p class="text-muted">Nenhum módulo habilitado para este tenant. Atribua um plano primeiro.</p>
                </div>

                <div class="table-responsive" th:unless="${#lists.isEmpty(matrix.enabledModules())}">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Módulo</th>
                            <th th:each="role : ${roles}" th:text="${role}">Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="module : ${matrix.enabledModules()}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="module-icon-chip"
                                          th:classappend="' ' + ${@moduleVisualMapper.toneClass(module.codigo)}">
                                        <i th:class="${@moduleVisualMapper.iconClass(module.codigo)}"></i>
                                    </span>
                                    <span th:text="${module.nome}">Módulo</span>
                                </div>
                            </td>
                            <td th:each="role : ${roles}">
                                <form th:action="@{/admin/permissions/tenants/{id}/matrix(id=${matrix.tenant().id})}"
                                      method="post" class="d-flex align-items-center gap-2">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="moduleId" th:value="${module.id}" />
                                    <input type="hidden" name="role" th:value="${role}" />
                                    <select class="form-select form-select-sm" name="accessLevel"
                                            onchange="this.form.submit()"
                                            th:disabled="${role.name() == 'ADMIN'}">
                                        <option th:each="level : ${matrix.accessLevels()}"
                                                th:value="${level}"
                                                th:text="${level}"
                                                th:selected="${matrix.levelFor(module.id, role) == level}">
                                        </option>
                                    </select>
                                    <span th:if="${role.name() == 'ADMIN'}"
                                          class="badge bg-success">FULL (padrão)</span>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
