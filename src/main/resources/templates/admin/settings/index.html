<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('settings')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Configurações', 'Parâmetros globais da plataforma', true)}"></div>

        <div data-app-toast data-toast-type="success"
             th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>

        <form th:action="@{/admin/settings}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <section class="bottom-grid" style="grid-template-columns: 1fr 1fr;">

                <!-- Plataforma -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4><i class="fa-solid fa-building-columns me-2"></i>Plataforma</h4>
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Nome da Plataforma</label>
                            <input class="form-control" type="text" name="platform.name"
                                   th:value="${settings['platform.name'] ?: 'ERP Corporativo'}" />
                        </div>
                        <div class="col-12">
                            <label class="form-label">E-mail de Suporte</label>
                            <input class="form-control" type="email" name="support.email"
                                   th:value="${settings['support.email'] ?: ''}" />
                        </div>
                        <div class="col-12">
                            <label class="form-label">Modo de Manutenção</label>
                            <select class="form-select" name="platform.maintenance_mode">
                                <option value="false" th:selected="${settings['platform.maintenance_mode'] != 'true'}">Desativado</option>
                                <option value="true"  th:selected="${settings['platform.maintenance_mode'] == 'true'}">Ativado</option>
                            </select>
                            <div class="text-muted small mt-1">Quando ativado, bloqueia acesso de tenants.</div>
                        </div>
                    </div>
                </div>

                <!-- Segurança -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4><i class="fa-solid fa-shield-halved me-2"></i>Segurança</h4>
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Timeout de Sessão (minutos)</label>
                            <input class="form-control" type="number" min="5" max="1440"
                                   name="security.session_timeout_minutes"
                                   th:value="${settings['security.session_timeout_minutes'] ?: '60'}" />
                        </div>
                        <div class="col-12">
                            <label class="form-label">Tamanho Mínimo de Senha</label>
                            <input class="form-control" type="number" min="6" max="32"
                                   name="security.password_min_length"
                                   th:value="${settings['security.password_min_length'] ?: '8'}" />
                        </div>
                        <div class="col-12">
                            <label class="form-label">Máximo de Usuários por Plano (padrão)</label>
                            <input class="form-control" type="number" min="1"
                                   name="plan.max_users_default"
                                   th:value="${settings['plan.max_users_default'] ?: '50'}" />
                        </div>
                    </div>
                </div>

            </section>

            <!-- Configurações customizadas -->
            <section class="bottom-grid" style="grid-template-columns: 1fr;" th:if="${settings.size() > 6}">
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4><i class="fa-solid fa-sliders me-2"></i>Todas as Configurações</h4>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle table-left">
                            <thead><tr><th>Chave</th><th>Valor</th></tr></thead>
                            <tbody>
                            <tr th:each="entry : ${settings}">
                                <td><code th:text="${entry.key}">chave</code></td>
                                <td>
                                    <input class="form-control form-control-sm"
                                           th:name="${entry.key}" th:value="${entry.value}" />
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <div class="px-3 pb-4">
                <button class="app-btn app-btn-primary" type="submit">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Salvar Configurações
                </button>
            </div>
        </form>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
