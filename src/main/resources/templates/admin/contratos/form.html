<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | ERP Corporativo'">Contrato | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('contratos')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4 th:text="${isEdit} ? 'Editar Contrato' : 'Novo Contrato'">Contrato</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/contratos}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="${isEdit} ? @{/admin/contratos/{id}(id=${contractId})} : @{/admin/contratos}"
                      th:object="${form}" method="post" class="row g-3">

                    <div data-app-toast data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- Tenant -->
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tenant <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{tenantId}" th:disabled="${isEdit}">
                            <option value="">Selecione o tenant...</option>
                            <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.nome}">Tenant</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tenantId')}" th:errors="*{tenantId}">Erro</div>
                    </div>

                    <!-- Plano -->
                    <div class="col-12 col-md-6">
                        <label class="form-label">Plano de Assinatura <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{subscriptionPlanId}">
                            <option value="">Selecione o plano...</option>
                            <option th:each="p : ${planos}" th:value="${p.id}" th:text="${p.nome}">Plano</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('subscriptionPlanId')}" th:errors="*{subscriptionPlanId}">Erro</div>
                    </div>

                    <!-- Valor Mensal -->
                    <div class="col-12 col-md-4">
                        <label class="form-label">Valor Mensal (R$) <span class="text-danger">*</span></label>
                        <input class="form-control" type="number" step="0.01" min="0" th:field="*{valorMensal}" placeholder="0,00" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('valorMensal')}" th:errors="*{valorMensal}">Erro</div>
                    </div>

                    <!-- Status -->
                    <div class="col-12 col-md-4">
                        <label class="form-label">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}">Status</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Erro</div>
                    </div>

                    <!-- Data Início -->
                    <div class="col-12 col-md-2">
                        <label class="form-label">Data de Início <span class="text-danger">*</span></label>
                        <input class="form-control" type="date" th:field="*{dataInicio}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dataInicio')}" th:errors="*{dataInicio}">Erro</div>
                    </div>

                    <!-- Data Término -->
                    <div class="col-12 col-md-2">
                        <label class="form-label">Data de Término</label>
                        <input class="form-control" type="date" th:field="*{dataTermino}" />
                        <small class="text-muted">Deixe em branco para contrato sem prazo</small>
                    </div>

                    <!-- Observações -->
                    <div class="col-12 col-md-10">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" rows="3" th:field="*{observacoes}"
                                  placeholder="Condições especiais, notas comerciais..."></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('observacoes')}" th:errors="*{observacoes}">Erro</div>
                    </div>

                    <!-- Dia de Vencimento -->
                    <div class="col-12 col-md-2">
                        <label class="form-label">Dia de Vencimento</label>
                        <input class="form-control" type="number" min="1" max="28" th:field="*{diaVencimento}" />
                        <small class="text-muted">Dia do mês (1-28)</small>
                    </div>

                    <!-- Ações -->
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-check me-2"></i>
                            <span th:text="${isEdit} ? 'Salvar alterações' : 'Criar contrato'">Salvar</span>
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/admin/contratos}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
