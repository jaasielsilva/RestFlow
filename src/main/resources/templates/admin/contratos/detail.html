<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${contract.tenantNome} + ' | Contrato | ERP Corporativo'">Contrato | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('contratos')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, false)}"></div>

        <div data-app-toast data-toast-type="success" th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"   th:attr="data-toast-message=${toastError}"   th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 2fr 1fr;">

            <!-- Detalhes do contrato -->
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4>
                        <i class="fa-solid fa-file-contract me-2"></i>
                        <span th:text="${contract.tenantNome}">Tenant</span>
                    </h4>
                    <div class="d-flex gap-2">
                        <a class="app-btn app-btn-outline app-btn-sm"
                           th:href="@{/admin/contratos/{id}/edit(id=${contract.id})}">
                            <i class="fa-solid fa-pen me-1"></i>Editar
                        </a>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/contratos}">
                            <i class="fa-solid fa-arrow-left me-1"></i>Voltar
                        </a>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Plano</label>
                        <p class="fw-semibold mb-0" th:text="${contract.subscriptionPlanNome ?: '—'}">—</p>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Valor Mensal</label>
                        <p class="fw-semibold mb-0"
                           th:text="${contract.valorMensal != null ? 'R$ ' + #numbers.formatDecimal(contract.valorMensal, 1, 'POINT', 2, 'COMMA') : '—'}">—</p>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Status</label>
                        <p class="mb-0">
                            <span class="badge"
                                  th:classappend="${contract.status.name() == 'ATIVO'} ? ' bg-success' :
                                                  (${contract.status.name() == 'SUSPENSO'} ? ' bg-warning text-dark' :
                                                  (${contract.status.name() == 'ENCERRADO'} ? ' bg-danger' : ' bg-secondary'))"
                                  th:text="${contract.status}">Status</span>
                            <span th:if="${contract.isVencido}" class="badge bg-danger ms-1">Vencido</span>
                            <span th:if="${contract.isVencendoEm30Dias and !contract.isVencido}" class="badge bg-warning text-dark ms-1">
                                <i class="fa-solid fa-bell me-1"></i>Vence em breve
                            </span>
                        </p>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Início</label>
                        <p class="mb-0 text-muted small" th:text="${#temporals.format(contract.dataInicio, 'dd/MM/yyyy')}">—</p>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Término</label>
                        <p class="mb-0 text-muted small"
                           th:text="${contract.dataTermino != null ? #temporals.format(contract.dataTermino, 'dd/MM/yyyy') : 'Indeterminado'}">—</p>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted">Criado em</label>
                        <p class="mb-0 text-muted small"
                           th:text="${contract.createdAt != null ? #temporals.format(contract.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</p>
                    </div>
                    <div class="col-12" th:if="${contract.observacoes != null and !contract.observacoes.isBlank()}">
                        <label class="form-label text-muted">Observações</label>
                        <p th:text="${contract.observacoes}" style="white-space: pre-wrap;">—</p>
                    </div>
                </div>

                <!-- Histórico de Pagamentos -->
                <div class="card-header-ui mt-2">
                    <h4><i class="fa-solid fa-receipt me-2"></i>Histórico de Pagamentos</h4>
                </div>

                <div th:if="${#lists.isEmpty(contract.pagamentos)}" class="text-muted py-2">
                    Nenhum pagamento registrado ainda.
                </div>

                <div class="table-responsive" th:unless="${#lists.isEmpty(contract.pagamentos)}">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Mês Ref.</th>
                            <th>Valor Pago</th>
                            <th>Data Pgto</th>
                            <th>Status</th>
                            <th>Observações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${contract.pagamentos}">
                            <td class="fw-semibold" th:text="${p.mesReferencia}">—</td>
                            <td th:text="${p.valorPago != null ? 'R$ ' + #numbers.formatDecimal(p.valorPago, 1, 'POINT', 2, 'COMMA') : '—'}">—</td>
                            <td class="text-muted small"
                                th:text="${p.dataPagamento != null ? #temporals.format(p.dataPagamento, 'dd/MM/yyyy') : '—'}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${p.status.name() == 'PAGO'} ? ' bg-success' :
                                                      (${p.isAtrasado} ? ' bg-danger' :
                                                      (${p.status.name() == 'PENDENTE'} ? ' bg-warning text-dark' : ' bg-secondary'))"
                                      th:text="${p.status}">Status</span>
                            </td>
                            <td class="text-muted small" th:text="${p.observacoes ?: '—'}">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Adicionar Pagamento -->
                <div class="mt-3">
                    <h6 class="text-muted">Registrar Pagamento</h6>
                    <form th:action="@{/admin/contratos/{id}/payments(id=${contract.id})}"
                          th:object="${paymentForm}" method="post" class="row g-2 align-items-end">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="col-12 col-md-2">
                            <label class="form-label">Mês Ref. (YYYY-MM)</label>
                            <input class="form-control form-control-sm" type="text" th:field="*{mesReferencia}" placeholder="2025-01" />
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">Valor Pago</label>
                            <input class="form-control form-control-sm" type="number" step="0.01" min="0" th:field="*{valorPago}" />
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">Data Pgto</label>
                            <input class="form-control form-control-sm" type="date" th:field="*{dataPagamento}" />
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">Status</label>
                            <select class="form-select form-select-sm" th:field="*{status}">
                                <option value="PAGO">PAGO</option>
                                <option value="PENDENTE">PENDENTE</option>
                                <option value="ATRASADO">ATRASADO</option>
                                <option value="CANCELADO">CANCELADO</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">Obs.</label>
                            <input class="form-control form-control-sm" type="text" th:field="*{observacoes}" />
                        </div>
                        <div class="col-12 col-md-2">
                            <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                                <i class="fa-solid fa-plus me-1"></i>Registrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Painel lateral -->
            <div class="d-flex flex-column gap-3">

                <!-- Alterar Status -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4>Alterar Status</h4>
                    </div>
                    <form th:action="@{/admin/contratos/{id}/status(id=${contract.id})}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <select class="form-select form-select-sm" name="status">
                            <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"
                                    th:selected="${contract.status == s}">Status</option>
                        </select>
                        <button class="app-btn app-btn-secondary app-btn-sm" type="submit">Aplicar</button>
                    </form>
                </div>

                <!-- Link para tenant -->
                <div class="card-ui">
                    <div class="card-header-ui">
                        <h4>Tenant</h4>
                    </div>
                    <p class="mb-2" th:text="${contract.tenantNome}">—</p>
                    <a class="app-btn app-btn-outline app-btn-sm"
                       th:href="@{/admin/tenants/{id}(id=${contract.tenantId})}">
                        <i class="fa-solid fa-building me-1"></i>Ver Tenant
                    </a>
                </div>

                <!-- Excluir -->
                <div class="card-ui">
                    <form th:action="@{/admin/contratos/{id}/delete(id=${contract.id})}" method="post"
                          onsubmit="return confirm('Confirma a exclusão deste contrato? Esta ação não pode ser desfeita.')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="app-btn app-btn-sm w-100" style="background:#fee2e2;color:#b91c1c;border:none;" type="submit">
                            <i class="fa-solid fa-trash me-2"></i>Excluir Contrato
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
