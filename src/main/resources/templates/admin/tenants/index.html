<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenants | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/auth/home.css">
</head>

<body>
    <div class="layout">
        <aside th:replace="~{fragments/sidebar :: sidebar('tenants')}"></aside>

        <main class="main">
            <div th:replace="~{fragments/topbar :: topbar('Tenants', 'Gestão de tenants da plataforma', true)}"></div>

            <section class="bottom-grid module-page-grid">
                <div class="card-ui module-card">
                    <div class="card-header-ui">
                        <h4>Lista de Tenants</h4>
                    </div>

                    <th:block th:replace="~{fragments/module-standard :: moduleToasts(${toastSuccess}, ${toastError})}"></th:block>

                    <form class="row g-2 align-items-end mb-3 tenant-filter-form module-filter-form" method="get"
                        th:action="@{/admin/tenants}">
                        <div class="col-12 col-md-3">
                            <label class="form-label">Nome</label>
                            <input class="form-control" type="text" name="nome" placeholder="Buscar por nome"
                                th:value="${param.nome}">
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">Slug</label>
                            <input class="form-control" type="text" name="slug" placeholder="Buscar por slug"
                                th:value="${param.slug}">
                        </div>
                        <div class="col-12 col-md-2">
                            <label class="form-label">Ativo</label>
                            <select class="form-select" name="ativo">
                                <option value="" th:selected="${param.ativo == null or #lists.isEmpty(param.ativo)}">
                                    Todos</option>
                                <option value="true" th:selected="${param.ativo != null and param.ativo[0] == 'true'}">
                                    Ativo</option>
                                <option value="false"
                                    th:selected="${param.ativo != null and param.ativo[0] == 'false'}">Inativo</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-4 d-flex align-items-end">
                            <div class="tenant-filter-actions">

                                <!-- FILTRO (cinza) -->
                                <button class="app-btn app-btn-secondary app-btn-sm tenant-btn-filter" type="submit">
                                    <i class="fa-solid fa-filter me-2"></i>Filtrar
                                </button>

                                <!-- NOVO (azul) -->
                                <a class="app-btn app-btn-primary app-btn-sm tenant-btn-new"
                                    th:href="@{/admin/tenants/new}">
                                    <i class="fa-solid fa-plus me-2"></i>Novo
                                </a>

                            </div>
                        </div>
                    </form>

                    <div class="table-responsive module-table-wrap">
                        <table class="table align-middle table-left module-table">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Slug</th>
                                    <th>Usuários</th>
                                    <th>Email Admin</th>
                                    <th>Status</th>
                                    <th>Contrato</th>
                                    <th>Criação</th>
                                    <th style="width: 250px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:if="${#lists.isEmpty(view.tenants)}">
                                    <tr th:replace="~{fragments/module-standard :: tableEmptyRow(8, 'Nenhum tenant encontrado.')}"></tr>
                                </th:block>
                                <tr th:each="tenant : ${view.tenants}">
                                    <td th:text="${tenant.nome}">Empresa</td>
                                    <td><span class="text-muted" th:text="${tenant.slug}">slug</span></td>
                                    <td th:text="${tenant.totalUsuarios}">0</td>
                                    <td th:text="${tenant.adminEmail}">admin@tenant.com</td>
                                    <td>
                                        <span class="badge-status"
                                            th:classappend="${tenant.ativo} ? ' badge-success' : ' badge-warning'"
                                            th:text="${tenant.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                                    </td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${tenant.contractStatus == 'ATIVO'} ? ' bg-success' :
                                                              (${tenant.contractStatus == 'SUSPENSO'} ? ' bg-warning text-dark' :
                                                              (${tenant.contractStatus == 'ENCERRADO'} ? ' bg-danger' : ' bg-secondary'))"
                                              th:text="${tenant.contractStatus}">—</span>
                                        <a th:if="${tenant.contractStatus == 'SEM CONTRATO'}"
                                           class="app-btn app-btn-outline app-btn-sm ms-1"
                                           th:href="@{/admin/contratos/new(tenantId=${tenant.id})}">
                                            <i class="fa-solid fa-plus me-1"></i>Contrato
                                        </a>
                                    </td>
                                    <td th:text="${tenant.createdAt != null ? #temporals.format(tenant.createdAt, 'dd/MM/yyyy') : '-'}">-</td>
                                    <td>
                                        <div th:replace="~{fragments/table-actions :: tenantActions(${tenant.id}, ${tenant.ativo})}"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3 module-pagination" th:if="${view.totalPages > 0}">
                        <div class="text-muted" th:text="'Página ' + (${view.page} + 1) + ' de ' + ${view.totalPages}">
                            Página 1 de 1</div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="text-muted" th:text="'Total: ' + ${#lists.size(view.tenants)}">Total: 0</span>
                            <div class="btn-group">
                                <a class="btn btn-outline-secondary btn-sm"
                                    th:classappend="${view.page == 0} ? ' disabled'"
                                    th:href="@{/admin/tenants(page=${view.page - 1}, size=${param.size}, nome=${param.nome}, slug=${param.slug}, ativo=${param.ativo})}">
                                    Anterior
                                </a>
                                <a class="btn btn-outline-secondary btn-sm"
                                    th:classappend="${view.page + 1 >= view.totalPages} ? ' disabled'"
                                    th:href="@{/admin/tenants(page=${view.page + 1}, size=${param.size}, nome=${param.nome}, slug=${param.slug}, ativo=${param.ativo})}">
                                    Próxima
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/shared/toast.js"></script>
    <script src="/js/shared/confirm-modal.js"></script>
</body>

</html>
