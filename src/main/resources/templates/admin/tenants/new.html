<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Tenant | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('tenants')}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Novo Tenant', 'Cadastrar um novo tenant na plataforma', false)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Dados do Tenant</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/tenants}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="@{/admin/tenants}" th:object="${form}" method="post" class="row g-3">
                    <div data-app-toast
                         data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-8">
                        <label class="form-label">Nome</label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome do tenant" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Ativo</label>
                        <select class="form-select" th:field="*{ativo}">
                            <option th:value="true">Ativo</option>
                            <option th:value="false">Inativo</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ativo')}" th:errors="*{ativo}">Erro</div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Slug</label>
                        <input class="form-control" type="text" th:field="*{slug}" placeholder="ex: empresa-alpha" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}">Erro</div>
                    </div>

                    <div class="col-12">
                        <hr class="my-2" />
                    </div>

                    <div class="col-12">
                        <h5 class="fw-bold mb-0">Admin inicial</h5>
                        <p class="text-muted mb-0">Usuário ADMIN que será criado automaticamente para este tenant.</p>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Nome do admin</label>
                        <input class="form-control" type="text" th:field="*{adminNome}" placeholder="Nome do admin" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('adminNome')}" th:errors="*{adminNome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Email do admin</label>
                        <input class="form-control" type="email" th:field="*{adminEmail}" placeholder="admin@tenant.com" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('adminEmail')}" th:errors="*{adminEmail}">Erro</div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Senha do admin</label>
                        <input class="form-control" type="password" th:field="*{adminPassword}" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('adminPassword')}" th:errors="*{adminPassword}">Erro</div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-check me-2"></i>Criar tenant
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/admin/tenants}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
