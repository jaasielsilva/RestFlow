<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulos do Tenant | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('modules')}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Módulos do Tenant', ${tenant.nome + ' • ' + tenant.slug}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Assinatura / Contrato</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/tenants}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <div data-app-toast
                     data-toast-type="success"
                     data-toast-message="Módulos do tenant atualizados com sucesso."
                     th:if="${param.updated != null}"></div>

                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Módulo</th>
                            <th>Código</th>
                            <th>Status</th>
                            <th style="width: 220px;">Ação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(modules)}">
                            <td colspan="4" class="text-muted">Nenhum módulo cadastrado na plataforma.</td>
                        </tr>
                        <tr th:each="m : ${modules}">
                            <td>
                                <strong th:text="${m.nome}">Nome</strong>
                                <div class="text-muted" th:if="${m.descricao != null}" th:text="${m.descricao}">Descrição</div>
                            </td>
                            <td><span class="text-muted" th:text="${m.codigo}">codigo</span></td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${states[m.id] == true} ? ' badge-success' : ' badge-warning'"
                                      th:text="${states[m.id] == true} ? 'Habilitado' : 'Desabilitado'">Status</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/modulos/tenants/{tenantId}(tenantId=${tenant.id})}" method="post" class="d-flex gap-2">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="moduleId" th:value="${m.id}" />
                                    <button class="app-btn app-btn-primary app-btn-sm" type="submit" name="enabled" value="true"
                                            th:if="${states[m.id] != true}">
                                        Habilitar
                                    </button>
                                    <button class="app-btn app-btn-outline app-btn-sm" type="submit" name="enabled" value="false"
                                            th:if="${states[m.id] == true}">
                                        Desabilitar
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
