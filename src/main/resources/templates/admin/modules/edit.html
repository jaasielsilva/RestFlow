<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Módulo | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('modules')}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Editar Módulo', 'Altere as configurações deste módulo da plataforma', true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui pb-3 mb-3 border-bottom d-flex align-items-center justify-content-between">
                    <h4><i class="fa-solid fa-pen-to-square me-2 text-primary"></i>Configurações do Módulo</h4>
                    <a th:href="@{/admin/modulos}" class="btn btn-sm btn-outline-secondary">
                        <i class="fa-solid fa-arrow-left me-1"></i>Voltar
                    </a>
                </div>

                <form th:action="@{/admin/modulos/{id}/edit(id=${module.id})}" th:object="${form}" method="post" class="row g-4 mb-2">
                    <div data-app-toast
                         data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-3">
                        <label class="form-label fw-semibold">Código</label>
                        <input class="form-control" type="text" th:field="*{codigo}" placeholder="ex: FINANCEIRO" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}">Erro</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label fw-semibold">Nome de Exibição</label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome do módulo" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-5">
                        <label class="form-label fw-semibold">Descrição</label>
                        <input class="form-control" type="text" th:field="*{descricao}" placeholder="Opcional" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro</div>
                    </div>

                    <div class="col-12 col-md-8">
                        <label class="form-label fw-semibold">Rota base no portal do cliente</label>
                        <input class="form-control" type="text" th:field="*{rota}" placeholder="ex: /app/modulos/financeiro (opcional)" />
                        <div class="text-muted small mt-1">Se deixado em branco, o sistema resolverá dinamicamente em <code>/app/modulos/{codigo}</code>.</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label fw-semibold">Status Operacional</label>
                        <select class="form-select" th:field="*{ativo}">
                            <option th:value="true">🟢 Ativado (Disponível aos Tenants)</option>
                            <option th:value="false">🔴 Inativo (Oculto)</option>
                        </select>
                    </div>

                    <div class="col-12 pt-3 mt-4 border-top d-flex gap-3">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
<script src="/js/shared/confirm-modal.js"></script>
</body>
</html>
