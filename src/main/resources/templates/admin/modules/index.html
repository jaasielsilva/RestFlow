<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulos | ERP Corporativo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('modules')}"></aside>

    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Módulos', 'Catálogo de módulos disponíveis na plataforma', true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Novo Módulo</h4>
                </div>

                <div data-app-toast
                     data-toast-type="success"
                     th:attr="data-toast-message=${toastSuccess}"
                     th:if="${toastSuccess != null}"></div>

                <form th:action="@{/admin/modulos}" th:object="${form}" method="post" class="row g-3 mb-4">
                    <div data-app-toast
                         data-toast-type="error"
                         th:attr="data-toast-message=${#fields.globalErrors()[0]}"
                         th:if="${#fields.hasGlobalErrors()}"></div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12 col-md-3">
                        <label class="form-label">Código</label>
                        <input class="form-control" type="text" th:field="*{codigo}" placeholder="ex: financeiro" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}">Erro</div>
                    </div>

                    <div class="col-12 col-md-5">
                        <label class="form-label">Nome</label>
                        <input class="form-control" type="text" th:field="*{nome}" placeholder="Nome do módulo" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Descrição</label>
                        <input class="form-control" type="text" th:field="*{descricao}" placeholder="Opcional" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro</div>
                    </div>

                    <div class="col-12 col-md-3">
                        <label class="form-label">Ativo</label>
                        <select class="form-select" th:field="*{ativo}">
                            <option th:value="true">Ativo</option>
                            <option th:value="false">Inativo</option>
                        </select>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-plus me-2"></i>Criar módulo
                        </button>
                        <!--
                        <button class="app-btn app-btn-outline" type="button"
                                onclick="window.AppToast && AppToast.success('Toast de sucesso: módulo salvo com sucesso!')">
                            Testar Toast Sucesso
                        </button>
                        <button class="app-btn app-btn-outline" type="button"
                                onclick="window.AppToast && AppToast.error('Toast de erro: não foi possível salvar o módulo.')">
                            Testar Toast Erro
                        </button>
                        -->
                    </div>
                </form>

                <div class="card-header-ui">
                    <h4>Lista de Módulos</h4>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Código</th>
                            <th>Status</th>
                            <th>Criação</th>
                            <th style="width: 160px;">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(modules)}">
                            <td colspan="5" class="text-muted">Nenhum módulo cadastrado.</td>
                        </tr>
                        <tr th:each="m : ${modules}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="module-icon-chip"
                                          th:classappend="' ' + ${@moduleVisualMapper.toneClass(m.codigo)}">
                                        <i th:class="${@moduleVisualMapper.iconClass(m.codigo)}"></i>
                                    </span>
                                    <span th:text="${m.nome}">Nome</span>
                                </div>
                            </td>
                            <td><span class="text-muted" th:text="${m.codigo}">codigo</span></td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${m.ativo} ? ' badge-success' : ' badge-warning'"
                                      th:text="${m.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                            </td>
                            <td th:text="${m.createdAt != null ? #temporals.format(m.createdAt, 'dd/MM/yyyy') : '-'}">-</td>
                            <td>
                                <div th:replace="~{fragments/table-actions :: moduleActions()}"></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-end mt-2">
                    <span class="text-muted" th:text="'Total: ' + ${#lists.size(modules)}">Total: 0</span>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
