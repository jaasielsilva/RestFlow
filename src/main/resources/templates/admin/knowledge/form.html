<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${isEdit} ? 'Editar Artigo' : 'Novo Artigo' + ' | ERP Corporativo'">Artigo | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('knowledge')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle}, true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4 th:text="${isEdit} ? 'Editar Artigo' : 'Novo Artigo'">Artigo</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/conhecimento}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                    </a>
                </div>

                <form th:action="${isEdit} ? @{/admin/conhecimento/{id}(id=${articleId})} : @{/admin/conhecimento}"
                      th:object="${form}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-12">
                        <label class="form-label">Título</label>
                        <input class="form-control" type="text" th:field="*{titulo}" placeholder="Título do artigo" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Resumo <span class="text-muted">(opcional)</span></label>
                        <input class="form-control" type="text" th:field="*{resumo}" placeholder="Breve descrição exibida na listagem" />
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Categoria</label>
                        <input class="form-control" type="text" th:field="*{categoria}"
                               placeholder="ex: Financeiro, Estoque, Geral"
                               list="categoriasList" />
                        <datalist id="categoriasList">
                            <option th:each="cat : ${categorias}" th:value="${cat}"></option>
                        </datalist>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                    </div>

                    <div class="col-12 col-md-3">
                        <label class="form-label">Visibilidade</label>
                        <select class="form-select" th:field="*{visibilidade}" id="visibilidadeSelect"
                                onchange="toggleTenantField()">
                            <option th:each="v : ${visibilidades}" th:value="${v}" th:text="${v}">VIS</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{publicado}">
                            <option th:value="true">Publicado</option>
                            <option th:value="false">Rascunho</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-4" id="tenantField"
                         th:style="${form.visibilidade != null and form.visibilidade.name() == 'PRIVADO'} ? '' : 'display:none'">
                        <label class="form-label">Tenant (exclusivo)</label>
                        <select class="form-select" th:field="*{tenantId}">
                            <option value="">Selecione o tenant</option>
                            <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.nome}">Tenant</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Conteúdo</label>
                        <textarea class="form-control" th:field="*{conteudo}" rows="16"
                                  placeholder="Escreva o conteúdo do artigo aqui..."></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('conteudo')}" th:errors="*{conteudo}"></div>
                        <div class="text-muted small mt-1">Suporta texto simples ou Markdown.</div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="app-btn app-btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i>
                            <span th:text="${isEdit} ? 'Salvar alterações' : 'Criar artigo'">Salvar</span>
                        </button>
                        <a class="app-btn app-btn-outline" th:href="@{/admin/conhecimento}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>

<script>
    function toggleTenantField() {
        const vis = document.getElementById('visibilidadeSelect').value;
        document.getElementById('tenantField').style.display = vis === 'PRIVADO' ? '' : 'none';
    }
    document.addEventListener('DOMContentLoaded', toggleTenantField);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
