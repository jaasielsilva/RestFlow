<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${article.titulo} + ' | ERP Corporativo'">Artigo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('knowledge')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Base de Conhecimento', ${article.titulo}, false)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span class="badge bg-secondary" th:text="${article.categoria}">cat</span>
                        <span class="badge"
                              th:classappend="${article.visibilidade.name() == 'PUBLICO'} ? ' bg-success' : (${article.visibilidade.name() == 'PRIVADO'} ? ' bg-warning text-dark' : ' bg-secondary')"
                              th:text="${article.visibilidade}">VIS</span>
                        <span class="badge-status"
                              th:classappend="${article.publicado} ? ' badge-success' : ' badge-warning'"
                              th:text="${article.publicado} ? 'Publicado' : 'Rascunho'">Status</span>
                        <span class="text-muted small"
                              th:text="'Criado em ' + ${article.createdAt != null ? #temporals.format(article.createdAt, 'dd/MM/yyyy') : '-'}"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <a class="app-btn app-btn-outline app-btn-sm"
                           th:href="@{/admin/conhecimento/{id}/edit(id=${article.id})}">
                            <i class="fa-solid fa-pen me-2"></i>Editar
                        </a>
                        <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/conhecimento}">
                            <i class="fa-solid fa-arrow-left me-2"></i>Voltar
                        </a>
                    </div>
                </div>

                <h2 class="mt-3 mb-1" th:text="${article.titulo}">Título</h2>
                <p class="text-muted mb-4" th:if="${article.resumo != null}" th:text="${article.resumo}"></p>

                <div class="article-content" style="white-space: pre-wrap; line-height: 1.8;"
                     th:text="${article.conteudo}">Conteúdo</div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
