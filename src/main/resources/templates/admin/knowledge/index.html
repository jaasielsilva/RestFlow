<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base de Conhecimento | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('knowledge')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Base de Conhecimento', 'Guias e artigos técnicos da plataforma', true)}"></div>

        <div data-app-toast data-toast-type="success"
             th:attr="data-toast-message=${toastSuccess}" th:if="${toastSuccess != null}"></div>
        <div data-app-toast data-toast-type="error"
             th:attr="data-toast-message=${toastError}" th:if="${toastError != null}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui">
                    <h4>Artigos</h4>
                </div>

                <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/admin/conhecimento}">
                    <div class="col-12 col-md-4">
                        <label class="form-label">Buscar</label>
                        <input class="form-control" type="text" name="busca" placeholder="Título do artigo"
                               th:value="${param.busca}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Categoria</label>
                        <select class="form-select" name="categoria">
                            <option value="">Todas</option>
                            <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"
                                    th:selected="${param.categoria != null and param.categoria[0] == cat}">
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-md-5 d-flex align-items-end gap-2">
                        <button class="app-btn app-btn-secondary app-btn-sm" type="submit">
                            <i class="fa-solid fa-filter me-2"></i>Filtrar
                        </button>
                        <a class="app-btn app-btn-primary app-btn-sm" th:href="@{/admin/conhecimento/new}">
                            <i class="fa-solid fa-plus me-2"></i>Novo Artigo
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Visibilidade</th>
                            <th>Tenant</th>
                            <th>Status</th>
                            <th>Criação</th>
                            <th style="width: 180px;">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="7" class="text-muted">Nenhum artigo encontrado.</td>
                        </tr>
                        <tr th:each="a : ${articles}">
                            <td>
                                <a th:href="@{/admin/conhecimento/{id}(id=${a.id})}"
                                   th:text="${a.titulo}" class="text-decoration-none fw-semibold">Título</a>
                                <div class="text-muted small" th:if="${a.resumo != null}" th:text="${a.resumo}"></div>
                            </td>
                            <td><span class="badge bg-secondary" th:text="${a.categoria}">cat</span></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${a.visibilidade.name() == 'PUBLICO'} ? ' bg-success' : (${a.visibilidade.name() == 'PRIVADO'} ? ' bg-warning text-dark' : ' bg-secondary')"
                                      th:text="${a.visibilidade}">VIS</span>
                            </td>
                            <td th:text="${a.tenant != null ? a.tenant.nome : '—'}">—</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${a.publicado} ? ' badge-success' : ' badge-warning'"
                                      th:text="${a.publicado} ? 'Publicado' : 'Rascunho'">Status</span>
                            </td>
                            <td th:text="${a.createdAt != null ? #temporals.format(a.createdAt, 'dd/MM/yyyy') : '-'}">-</td>
                            <td>
                                <div class="table-actions">
                                    <a class="app-btn app-btn-outline app-btn-sm action-icon"
                                       th:href="@{/admin/conhecimento/{id}(id=${a.id})}" title="Visualizar">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a class="app-btn app-btn-outline app-btn-sm action-icon"
                                       th:href="@{/admin/conhecimento/{id}/edit(id=${a.id})}" title="Editar">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form th:action="@{/admin/conhecimento/{id}/toggle(id=${a.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button class="app-btn app-btn-outline app-btn-sm action-icon" type="submit"
                                                th:title="${a.publicado} ? 'Despublicar' : 'Publicar'">
                                            <i th:class="${a.publicado} ? 'fa-solid fa-eye-slash' : 'fa-solid fa-check'"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/conhecimento/{id}/delete(id=${a.id})}" method="post" style="display:inline"
                                          onsubmit="return confirm('Remover este artigo?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button class="app-btn app-btn-outline app-btn-sm action-icon" type="submit" title="Remover">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
                    <div class="text-muted" th:text="'Página ' + (${currentPage} + 1) + ' de ' + ${totalPages}"></div>
                    <div class="btn-group">
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${currentPage == 0} ? ' disabled'"
                           th:href="@{/admin/conhecimento(page=${currentPage - 1}, categoria=${param.categoria}, busca=${param.busca})}">Anterior</a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                           th:href="@{/admin/conhecimento(page=${currentPage + 1}, categoria=${param.categoria}, busca=${param.busca})}">Próxima</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared/toast.js"></script>
</body>
</html>
