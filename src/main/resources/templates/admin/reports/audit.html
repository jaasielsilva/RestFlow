<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoria | ERP Corporativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/auth/home.css" />
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('reports')}"></aside>
    <main class="main">
        <div th:replace="~{fragments/topbar :: topbar('Auditoria', 'Log de ações da plataforma', true)}"></div>

        <section class="bottom-grid" style="grid-template-columns: 1fr;">
            <div class="card-ui">
                <div class="card-header-ui d-flex justify-content-between align-items-center">
                    <h4><i class="fa-solid fa-clock-rotate-left me-2"></i>Log de Auditoria</h4>
                    <a class="app-btn app-btn-outline app-btn-sm" th:href="@{/admin/reports}">
                        <i class="fa-solid fa-arrow-left me-2"></i>Relatórios
                    </a>
                </div>

                <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/admin/reports/audit}">
                    <div class="col-12 col-md-3">
                        <label class="form-label">Ação</label>
                        <select class="form-select" name="acao">
                            <option value="">Todas</option>
                            <option th:each="a : ${acoes}" th:value="${a}" th:text="${a}"
                                    th:selected="${param.acao != null and param.acao[0] == a.name()}">
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Entidade</label>
                        <input class="form-control" type="text" name="entidade"
                               placeholder="Tenant, Usuario..." th:value="${param.entidade}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Executado por</label>
                        <input class="form-control" type="text" name="executadoPor"
                               placeholder="email ou nome" th:value="${param.executadoPor}">
                    </div>
                    <div class="col-12 col-md-3">
                        <button class="app-btn app-btn-secondary app-btn-sm w-100" type="submit">
                            <i class="fa-solid fa-filter me-2"></i>Filtrar
                        </button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table align-middle table-left">
                        <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Ação</th>
                            <th>Descrição</th>
                            <th>Entidade</th>
                            <th>Executado por</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(logs)}">
                            <td colspan="5" class="text-muted">Nenhum registro encontrado.</td>
                        </tr>
                        <tr th:each="log : ${logs}">
                            <td class="text-muted small"
                                th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                            <td><span class="badge bg-secondary" th:text="${log.acao}">ACAO</span></td>
                            <td th:text="${log.descricao}">Descrição</td>
                            <td>
                                <span th:if="${log.entidade != null}" class="text-muted small"
                                      th:text="${log.entidade} + (${log.entidadeId != null} ? ' #' + ${log.entidadeId} : '')"></span>
                                <span th:unless="${log.entidade != null}" class="text-muted">—</span>
                            </td>
                            <td class="text-muted small" th:text="${log.executadoPor ?: '—'}">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
                    <div class="text-muted" th:text="'Página ' + (${currentPage} + 1) + ' de ' + ${totalPages}">Página 1 de 1</div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" th:text="'Total: ' + ${#lists.size(logs)}">Total: 0</span>
                        <div class="btn-group">
                            <a class="btn btn-outline-secondary btn-sm"
                               th:classappend="${currentPage == 0} ? ' disabled'"
                               th:href="@{/admin/reports/audit(page=${currentPage - 1}, acao=${param.acao}, entidade=${param.entidade}, executadoPor=${param.executadoPor})}">
                                Anterior
                            </a>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                               th:href="@{/admin/reports/audit(page=${currentPage + 1}, acao=${param.acao}, entidade=${param.entidade}, executadoPor=${param.executadoPor})}">
                                Próxima
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
