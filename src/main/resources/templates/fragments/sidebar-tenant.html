<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(active)">
    <a href="#" class="brand">
        <div class="brand-icon">
            <i class="fa-solid fa-store"></i>
        </div>
        <div>
            <p class="brand-title">ERP</p>
            <p class="brand-subtitle">Portal Cliente</p>
        </div>
    </a>

    <div class="menu-title">Menu</div>

    <a class="nav-link-custom"
       th:each="module : ${tenantModules}"
       th:classappend="${active == module.activeKey} ? ' active' : ''"
       th:href="${module.path}">
        <span class="module-nav-icon" th:classappend="' ' + ${module.toneClass}">
            <i th:class="${module.iconClass}"></i>
        </span>
        <span th:text="${module.nome}">Módulo</span>
    </a>

    <p class="text-muted" style="font-size:0.85rem; margin: 10px 6px 0;"
       th:if="${#lists.isEmpty(tenantModules)}">
        Nenhum módulo habilitado para este tenant.
    </p>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit"
                    class="nav-link-custom"
                    style="width:100%; border:0; background:transparent; text-align:left; cursor:pointer;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </form>
    </div>
</aside>
</body>
</html>
