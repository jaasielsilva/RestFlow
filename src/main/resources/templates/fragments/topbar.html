<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="topbar(title, subtitle, showControls)">
    <div class="topbar">
        <div>
            <h1 th:text="${title}">Título</h1>
            <small th:if="${subtitle != null}" th:text="${subtitle}">Subtítulo</small>
        </div>

        <div class="topbar-right" th:if="${showControls}">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar..." />
            </div>
            <div class="topbar-notifications">
                <button id="notifToggle" type="button" class="icon-btn topbar-bell-btn" aria-expanded="false" aria-controls="notifMenu">
                    <i class="fa-regular fa-bell"></i>
                    <span class="notif-badge" id="notifBadge" hidden>0</span>
                </button>
                <div id="notifMenu" class="notif-menu" hidden>
                    <div class="notif-header">
                        <strong>Notificações</strong>
                        <button id="notifMarkAll"
                                type="button"
                                class="notif-link-btn"
                                th:attr="data-csrf-token=${_csrf.token},data-csrf-header=${_csrf.headerName}">
                            Marcar todas como lidas
                        </button>
                    </div>
                    <div id="notifList"></div>
                    <a class="notif-view-all" id="notifViewAll" th:href="@{/admin/notifications}">Ver todas</a>
                </div>
            </div>
            <a id="topbarConfigLink"
               class="icon-btn"
               th:href="@{/admin/settings}"
               aria-label="Configurações"
               title="Configurações">
                <i class="fa-solid fa-gear"></i>
            </a>
            <div class="user-box">
                <div class="avatar"
                     th:classappend="' ' + ${topbarAvatarRoleClass}"
                     th:text="${topbarUserInitials}">U</div>
                <strong th:text="${topbarUserName}">Usuário</strong>
            </div>
        </div>
    </div>
    <div id="app-toast-root" class="app-toast-root" aria-live="polite" aria-atomic="true"></div>
    <script src="/js/shared/toast.js"></script>
    <script src="/js/shared/confirm-modal.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (window.AppToast) {
                window.AppToast.fromDocument();
            }

            const toggle = document.getElementById("notifToggle");
            const menu = document.getElementById("notifMenu");
            const markAll = document.getElementById("notifMarkAll");
            const notifList = document.getElementById("notifList");
            const badge = document.getElementById("notifBadge");
            const viewAll = document.getElementById("notifViewAll");
            const configLink = document.getElementById("topbarConfigLink");
            const isAdminArea = window.location.pathname.startsWith("/admin");
            const isTenantArea = window.location.pathname.startsWith("/app");
            const inSupportedArea = isAdminArea || isTenantArea;
            const recentUrl = isAdminArea
                ? "/api/v1/admin/notifications/recent"
                : "/api/v1/tenant/notifications/recent";
            const markAllUrl = isAdminArea
                ? "/api/v1/admin/notifications/mark-all-read"
                : "/api/v1/tenant/notifications/mark-all-read";
            if (!toggle || !menu) {
                return;
            }
            if (viewAll) {
                viewAll.href = isAdminArea ? "/admin/notifications" : "/app/notifications";
            }
            if (configLink) {
                configLink.href = isAdminArea ? "/admin/settings" : "/app/configuracoes";
            }

            function renderNotifications(feed) {
                if (!notifList) return;
                notifList.innerHTML = "";

                if (!feed || !Array.isArray(feed.items) || feed.items.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "notif-item";
                    empty.innerHTML = "<p class='notif-title'>Sem notificações</p><small>Nenhum evento recente.</small>";
                    notifList.appendChild(empty);
                } else {
                    feed.items.forEach(function (item) {
                        const div = document.createElement("div");
                        div.className = "notif-item";
                        const createdAt = item.createdAt ? new Date(item.createdAt).toLocaleString("pt-BR") : "";
                        div.innerHTML = "<p class='notif-title'>" + item.title + "</p>" +
                            "<small>" + item.message + "</small>" +
                            (createdAt ? "<small>" + createdAt + "</small>" : "");
                        notifList.appendChild(div);
                    });
                }

                if (badge) {
                    const unread = feed && typeof feed.unreadCount === "number" ? feed.unreadCount : 0;
                    badge.textContent = String(unread);
                    badge.hidden = unread <= 0;
                }
            }

            async function loadNotifications() {
                if (!inSupportedArea) {
                    if (badge) badge.hidden = true;
                    return;
                }
                try {
                    const response = await fetch(recentUrl, {
                        headers: { "Accept": "application/json" }
                    });
                    if (!response.ok) return;
                    const body = await response.json();
                    renderNotifications(body.data);
                } catch (_) {
                    // Silently ignore polling failures.
                }
            }

            function closeMenu() {
                menu.hidden = true;
                toggle.setAttribute("aria-expanded", "false");
            }

            toggle.addEventListener("click", function () {
                const isOpen = !menu.hidden;
                if (isOpen) {
                    closeMenu();
                    return;
                }
                menu.hidden = false;
                toggle.setAttribute("aria-expanded", "true");
            });

            document.addEventListener("click", function (event) {
                if (!menu.hidden && !event.target.closest(".topbar-notifications")) {
                    closeMenu();
                }
            });

            if (markAll) {
                markAll.addEventListener("click", async function () {
                    if (!inSupportedArea) {
                        closeMenu();
                        return;
                    }
                    const csrfHeader = markAll.getAttribute("data-csrf-header");
                    const csrfToken = markAll.getAttribute("data-csrf-token");
                    try {
                        const headers = { "Accept": "application/json" };
                        if (csrfHeader && csrfToken) {
                            headers[csrfHeader] = csrfToken;
                        }
                        const response = await fetch(markAllUrl, {
                            method: "POST",
                            headers: headers
                        });
                        if (response.ok) {
                            await loadNotifications();
                            if (window.AppToast) {
                                window.AppToast.success("Todas as notificações foram marcadas como lidas.");
                            }
                        }
                    } catch (_) {
                        if (window.AppToast) {
                            window.AppToast.error("Falha ao marcar notificações como lidas.");
                        }
                    } finally {
                        closeMenu();
                    }
                });
            }

            loadNotifications();
            if (inSupportedArea) {
                setInterval(loadNotifications, 15000);
            }
        });
    </script>
</th:block>
</body>
</html>
