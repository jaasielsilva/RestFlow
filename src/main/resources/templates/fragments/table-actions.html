<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="contractActions(contractId)">
    <div class="table-actions">
        <a class="app-btn app-btn-outline app-btn-sm action-icon"
           th:href="@{/admin/contratos/{id}(id=${contractId})}"
           title="Visualizar" aria-label="Visualizar contrato">
            <i class="fa-solid fa-eye"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon"
           th:href="@{/admin/contratos/{id}/edit(id=${contractId})}"
           title="Editar" aria-label="Editar contrato">
            <i class="fa-solid fa-pen"></i>
        </a>
        <form th:action="@{/admin/contratos/{id}/delete(id=${contractId})}" method="post" style="margin:0;"
              data-confirm
              data-confirm-title="Excluir contrato"
              data-confirm-message="Esta ação é irreversível. O contrato será removido permanentemente."
              data-confirm-btn="Excluir"
              data-confirm-danger>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="app-btn app-btn-outline app-btn-sm action-icon" type="submit"
                    title="Excluir" aria-label="Excluir contrato"
                    style="color:#dc3545; border-color:#dc3545;">
                <i class="fa-solid fa-trash"></i>
            </button>
        </form>
    </div>
</th:block>

<th:block th:fragment="tenantActions(tenantId, tenantAtivo)">
    <div class="table-actions">
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-edit"
           th:href="@{/admin/tenants/{tenantId}/edit(tenantId=${tenantId})}"
           title="Editar tenant" aria-label="Editar tenant">
            <i class="fa-solid fa-pen"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-modules"
           th:href="@{/admin/modulos/tenants/{tenantId}(tenantId=${tenantId})}"
           title="Módulos" aria-label="Módulos do tenant">
            <i class="fa-solid fa-layer-group"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-users"
           th:href="@{/admin/users(tenantId=${tenantId})}" title="Usuários"
           aria-label="Usuários do tenant">
            <i class="fa-solid fa-users"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-permissions"
           th:href="@{/admin/permissions/tenants/{tenantId}/matrix(tenantId=${tenantId})}"
           title="Permissões por role" aria-label="Matriz de permissões do tenant">
            <i class="fa-solid fa-shield-halved"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-reset"
           th:href="@{/admin/tenants/{tenantId}/reset-admin-password(tenantId=${tenantId})}"
           title="Resetar senha do ADMIN do tenant"
           aria-label="Resetar senha do admin do tenant">
            <i class="fa-solid fa-key"></i>
        </a>
        <form th:if="${tenantAtivo}"
              th:action="@{/admin/tenants/{tenantId}/toggle-status(tenantId=${tenantId})}" method="post" style="margin:0;"
              data-confirm
              data-confirm-title="Inativar tenant"
              data-confirm-message="Deseja inativar este tenant? Usuários deste tenant ficarão sem acesso até reativação."
              data-confirm-btn="Inativar"
              data-confirm-danger>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-toggle"
                    type="submit"
                    title="Inativar tenant"
                    aria-label="Inativar tenant">
                <i class="fa-solid fa-toggle-on"></i>
            </button>
        </form>
        <form th:if="${!tenantAtivo}"
              th:action="@{/admin/tenants/{tenantId}/toggle-status(tenantId=${tenantId})}" method="post" style="margin:0;"
              data-confirm
              data-confirm-title="Ativar tenant"
              data-confirm-message="Deseja ativar este tenant?"
              data-confirm-btn="Ativar">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-toggle"
                    type="submit"
                    title="Ativar tenant"
                    aria-label="Ativar tenant">
                <i class="fa-solid fa-toggle-off"></i>
            </button>
        </form>
    </div>
</th:block>

<th:block th:fragment="userActions(userId, tenantId, role)">
    <div class="table-actions">
        <form th:if="${role != 'SUPER_ADMIN'}"
              th:action="@{/admin/users/{id}/reset-password(id=${userId})}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-reset" type="submit"
                    title="Resetar senha do usuário" aria-label="Resetar senha do usuário">
                <i class="fa-solid fa-key"></i>
            </button>
        </form>
        <button th:if="${role == 'SUPER_ADMIN'}"
                class="app-btn app-btn-outline app-btn-sm action-icon action-icon-reset is-disabled"
                type="button" disabled title="Reset de senha indisponível para SUPER_ADMIN">
            <i class="fa-solid fa-key"></i>
        </button>
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-modules"
           th:if="${tenantId != null}"
           th:href="@{/admin/modulos/tenants/{tenantId}(tenantId=${tenantId})}"
           title="Módulos do tenant" aria-label="Módulos do tenant">
            <i class="fa-solid fa-layer-group"></i>
        </a>
        <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-modules is-disabled"
                th:if="${tenantId == null}" type="button" disabled title="Sem tenant associado">
            <i class="fa-solid fa-layer-group"></i>
        </button>
        <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-permissions is-disabled"
                type="button" disabled title="Permissões (em breve)">
            <i class="fa-solid fa-shield-halved"></i>
        </button>
        <button class="app-btn app-btn-outline app-btn-sm action-icon action-icon-rbac is-disabled"
                type="button" disabled title="RBAC (em breve)">
            <i class="fa-solid fa-user-lock"></i>
        </button>
    </div>
</th:block>

<th:block th:fragment="moduleActions(moduleId)">
    <div class="table-actions">
        <a class="app-btn app-btn-outline app-btn-sm action-icon action-icon-users"
           th:href="@{/admin/tenants}" title="Gerenciar tenants"
           aria-label="Gerenciar tenants">
            <i class="fa-solid fa-building"></i>
        </a>
        <a class="app-btn app-btn-outline app-btn-sm action-icon"
           th:href="@{/admin/modulos/{id}/edit(id=${moduleId})}"
           title="Editar" aria-label="Editar módulo">
            <i class="fa-solid fa-pen"></i>
        </a>
        <form th:action="@{/admin/modulos/{id}/delete(id=${moduleId})}" method="post" style="margin:0;"
              data-confirm
              data-confirm-title="Excluir Módulo"
              data-confirm-message="Tem certeza? Se este módulo for excluído, todos os Tenants perderão o acesso a ele instantaneamente."
              data-confirm-btn="Excluir"
              data-confirm-danger>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="app-btn app-btn-outline app-btn-sm action-icon" type="submit"
                    title="Excluir" aria-label="Excluir módulo"
                    style="color:#dc3545; border-color:#dc3545;">
                <i class="fa-solid fa-trash"></i>
            </button>
        </form>
    </div>
</th:block>
</body>
</html>
